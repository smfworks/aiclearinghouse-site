    <text x="135" y="206" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10" font-weight="bold">3 ORIGINAL NVFP4 CONTRIBUTIONS</text>
    
    <!-- Stars -->
    <text x="12" y="228" fill="#22c55e" font-family="Arial, sans-serif" font-size="12" font-weight="bold">★</text>
    <text x="28" y="228" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="10">Mixtral-8x22B → ~79 GB</text>
    
    <text x="12" y="246" fill="#22c55e" font-family="Arial, sans-serif" font-size="12" font-weight="bold">★</text>
    <text x="28" y="246" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="10">GLM-4.7-Flash → ~17.5 GB</text>
    
    <text x="12" y="264" fill="#22c55e" font-family="Arial, sans-serif" font-size="12" font-weight="bold">★</text>
    <text x="28" y="264" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="10">Mistral-Large-2411 → ~69 GB</text>
    
    <text x="135" y="284" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">No NVFP4 version exists anywhere</text>
  </g>
  
  <!-- Connecting arrows: chip → tiers -->
  <path d="M 200 240 Q 225 240 250 200" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,4" fill="none" opacity="0.4"/>
  <path d="M 200 260 Q 225 300 250 410" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,4" fill="none" opacity="0.4"/>
  <path d="M 530 210 Q 555 210 580 250" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,4" fill="none" opacity="0.4"/>
  
  <!-- Footer -->

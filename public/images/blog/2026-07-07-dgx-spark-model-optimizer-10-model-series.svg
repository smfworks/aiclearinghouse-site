      <text x="12" y="18" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" font-weight="bold">W5 · Llama-4-Scout</text>
      <text x="12" y="34" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">217 GB → 65 GB + multimodal</text>
      <text x="268" y="18" text-anchor="end" fill="#f59e0b" font-family="Arial, sans-serif" font-size="10" font-weight="bold">109B/17B</text>
      <text x="268" y="34" text-anchor="end" fill="#64748b" font-family="Arial, sans-serif" font-size="9">722K ↓</text>
      
      <!-- W6: Step-3.5-Flash -->
      <rect x="0" y="58" width="280" height="48" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
      <text x="12" y="76" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" font-weight="bold">W6 · Step-3.5-Flash</text>
      <text x="12" y="92" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">399 GB → ~112 GB + FP8 KV</text>
      <text x="268" y="76" text-anchor="end" fill="#f59e0b" font-family="Arial, sans-serif" font-size="10" font-weight="bold">196B/11B</text>
      <text x="268" y="92" text-anchor="end" fill="#64748b" font-family="Arial, sans-serif" font-size="9">175K ↓</text>
      
      <!-- W7: DeepSeek-V4-Flash -->
      <rect x="0" y="116" width="280" height="48" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
      <text x="12" y="134" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" font-weight="bold">W7 · DeepSeek-V4-Flash</text>
      <text x="12" y="150" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">160 GB → expert pruning 256→128</text>
      <text x="268" y="134" text-anchor="end" fill="#f59e0b" font-family="Arial, sans-serif" font-size="10" font-weight="bold">~671B/6B</text>
      <text x="268" y="150" text-anchor="end" fill="#64748b" font-family="Arial, sans-serif" font-size="9">2.4M ↓</text>
      
      <!-- W8: Qwen3-235B-A22B -->
      <rect x="0" y="174" width="280" height="48" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
      <text x="12" y="192" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" font-weight="bold">W8 · Qwen3-235B-A22B</text>
      <text x="12" y="208" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">470 GB → ~132 GB + FP8 KV + ctx</text>
      <text x="268" y="192" text-anchor="end" fill="#f59e0b" font-family="Arial, sans-serif" font-size="10" font-weight="bold">235B/22B</text>
      <text x="268" y="208" text-anchor="end" fill="#64748b" font-family="Arial, sans-serif" font-size="9">919K ↓</text>
    </g>
  </g>
  
  <!-- Tier 3: Prune + Distill + Quantize -->
  <g transform="translate(580, 225)">
    <!-- Tier header -->
    <rect x="0" y="0" width="280" height="32" rx="6" fill="#ef4444" fill-opacity="0.2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="140" y="21" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="12" font-weight="bold">TIER 3: PRUNE → DISTILL → QUANTIZE</text>
    
    <!-- Model cards -->
    <g transform="translate(0, 48)">
      <!-- W9: Llama-3.1-405B -->
      <rect x="0" y="0" width="280" height="64" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4"/>
      <text x="12" y="18" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" font-weight="bold">W9 · Llama-3.1-405B</text>
      <text x="12" y="34" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">812 GB → 234 GB (FP4) → ~56–67 GB</text>
      <text x="12" y="50" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Minitron prune → distill → NVFP4</text>
      <text x="268" y="18" text-anchor="end" fill="#ef4444" font-family="Arial, sans-serif" font-size="10" font-weight="bold">405B dense</text>
      <text x="268" y="34" text-anchor="end" fill="#64748b" font-family="Arial, sans-serif" font-size="9">212K ↓</text>
      
      <!-- W10: DeepSeek-R1 -->
      <rect x="0" y="74" width="280" height="64" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4"/>
      <text x="12" y="92" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" font-weight="bold">W10 · DeepSeek-R1 (FINALE)</text>
      <text x="12" y="108" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">689 GB → 424 GB (FP4) → ~112 GB</text>
      <text x="12" y="124" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Expert prune 256→64 → distill → NVFP4</text>
      <text x="268" y="92" text-anchor="end" fill="#ef4444" font-family="Arial, sans-serif" font-size="10" font-weight="bold">671B/37B</text>
      <text x="268" y="108" text-anchor="end" fill="#64748b" font-family="Arial, sans-serif" font-size="9">8.6M ↓</text>
    </g>
  </g>
  
  <!-- Right side: smf-bench summary -->
  <g transform="translate(900, 100)">
    <rect x="0" y="0" width="270" height="290" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>

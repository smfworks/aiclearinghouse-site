    <text x="258" y="136" text-anchor="end" fill="#a855f7" font-family="Arial, sans-serif" font-size="11" font-weight="bold">69.6%</text>
    <rect x="12" y="140" width="246" height="8" rx="4" fill="#1e293b"/>
    <rect x="12" y="140" width="171" height="8" rx="4" fill="#a855f7" fill-opacity="0.6"/>
    
    <!-- Bar 4: Nemotron-3-Nano -->
    <text x="12" y="160" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="10">Nemotron-3-Nano-30B</text>
    <text x="258" y="160" text-anchor="end" fill="#f59e0b" font-family="Arial, sans-serif" font-size="11" font-weight="bold">54.7%</text>
    <rect x="12" y="164" width="246" height="8" rx="4" fill="#1e293b"/>
    <rect x="12" y="164" width="135" height="8" rx="4" fill="#f59e0b" fill-opacity="0.6"/>
    
    <!-- Divider -->

    <!-- Bar 1: Gemma-4-26B -->
    <text x="12" y="88" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="10">Gemma-4-26B</text>
    <text x="258" y="88" text-anchor="end" fill="#22c55e" font-family="Arial, sans-serif" font-size="11" font-weight="bold">84.0%</text>
    <rect x="12" y="92" width="246" height="8" rx="4" fill="#1e293b"/>
    <rect x="12" y="92" width="207" height="8" rx="4" fill="#22c55e" fill-opacity="0.6"/>
    
    <!-- Bar 2: Qwen3.6-35B -->
    <text x="12" y="112" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="10">Qwen3.6-35B</text>
    <text x="258" y="112" text-anchor="end" fill="#3b82f6" font-family="Arial, sans-serif" font-size="11" font-weight="bold">71.3%</text>
    <rect x="12" y="116" width="246" height="8" rx="4" fill="#1e293b"/>
    <rect x="12" y="116" width="176" height="8" rx="4" fill="#3b82f6" fill-opacity="0.6"/>
    
    <!-- Bar 3: Nemotron-3-Super -->

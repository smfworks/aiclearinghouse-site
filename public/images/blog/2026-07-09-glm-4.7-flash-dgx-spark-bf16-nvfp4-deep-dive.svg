  <g transform="translate(620, 120)">
    <!-- Grid of 64 experts (8x8), each 30px circle with 8px spacing -->
    <!-- Active experts are highlighted: positions 3,17,34,52 (random active ones) -->
    <g>
      <!-- Row 1 -->
      <circle cx="20" cy="20" r="12" fill="url(#expertDim)"/>
      <circle cx="44" cy="20" r="12" fill="url(#expertDim)"/>
      <circle cx="68" cy="20" r="12" fill="url(#expertActive)"/>
      <circle cx="92" cy="20" r="12" fill="url(#expertDim)"/>
      <circle cx="116" cy="20" r="12" fill="url(#expertDim)"/>
      <circle cx="140" cy="20" r="12" fill="url(#expertDim)"/>
      <circle cx="164" cy="20" r="12" fill="url(#expertDim)"/>
      <circle cx="188" cy="20" r="12" fill="url(#expertDim)"/>
      <!-- Row 2 -->
      <circle cx="20" cy="44" r="12" fill="url(#expertDim)"/>
      <circle cx="44" cy="44" r="12" fill="url(#expertDim)"/>
      <circle cx="68" cy="44" r="12" fill="url(#expertDim)"/>
      <circle cx="92" cy="44" r="12" fill="url(#expertDim)"/>
      <circle cx="116" cy="44" r="12" fill="url(#expertActive)"/>
      <circle cx="140" cy="44" r="12" fill="url(#expertDim)"/>
      <circle cx="164" cy="44" r="12" fill="url(#expertDim)"/>
      <circle cx="188" cy="44" r="12" fill="url(#expertDim)"/>
      <!-- Row 3 -->
      <circle cx="20" cy="68" r="12" fill="url(#expertDim)"/>
      <circle cx="44" cy="68" r="12" fill="url(#expertDim)"/>
      <circle cx="68" cy="68" r="12" fill="url(#expertDim)"/>
      <circle cx="92" cy="68" r="12" fill="url(#expertDim)"/>
      <circle cx="116" cy="68" r="12" fill="url(#expertDim)"/>
      <circle cx="140" cy="68" r="12" fill="url(#expertDim)"/>
      <circle cx="164" cy="68" r="12" fill="url(#expertDim)"/>
      <circle cx="188" cy="68" r="12" fill="url(#expertDim)"/>
      <!-- Row 4 -->
      <circle cx="20" cy="92" r="12" fill="url(#expertDim)"/>
      <circle cx="44" cy="92" r="12" fill="url(#expertDim)"/>
      <circle cx="68" cy="92" r="12" fill="url(#expertActive)"/>
      <circle cx="92" cy="92" r="12" fill="url(#expertDim)"/>
      <circle cx="116" cy="92" r="12" fill="url(#expertDim)"/>
      <circle cx="140" cy="92" r="12" fill="url(#expertDim)"/>
      <circle cx="164" cy="92" r="12" fill="url(#expertDim)"/>
      <circle cx="188" cy="92" r="12" fill="url(#expertDim)"/>
      <!-- Row 5 -->
      <circle cx="20" cy="116" r="12" fill="url(#expertDim)"/>
      <circle cx="44" cy="116" r="12" fill="url(#expertDim)"/>
      <circle cx="68" cy="116" r="12" fill="url(#expertDim)"/>
      <circle cx="92" cy="116" r="12" fill="url(#expertDim)"/>
      <circle cx="116" cy="116" r="12" fill="url(#expertDim)"/>
      <circle cx="140" cy="116" r="12" fill="url(#expertDim)"/>
      <circle cx="164" cy="116" r="12" fill="url(#expertDim)"/>
      <circle cx="188" cy="116" r="12" fill="url(#expertDim)"/>
      <!-- Row 6 -->
      <circle cx="20" cy="140" r="12" fill="url(#expertDim)"/>
      <circle cx="44" cy="140" r="12" fill="url(#expertDim)"/>
      <circle cx="68" cy="140" r="12" fill="url(#expertDim)"/>
      <circle cx="92" cy="140" r="12" fill="url(#expertActive)"/>
      <circle cx="116" cy="140" r="12" fill="url(#expertDim)"/>
      <circle cx="140" cy="140" r="12" fill="url(#expertDim)"/>
      <circle cx="164" cy="140" r="12" fill="url(#expertDim)"/>
      <circle cx="188" cy="140" r="12" fill="url(#expertDim)"/>
      <!-- Row 7 -->
      <circle cx="20" cy="164" r="12" fill="url(#expertDim)"/>
      <circle cx="44" cy="164" r="12" fill="url(#expertDim)"/>
      <circle cx="68" cy="164" r="12" fill="url(#expertDim)"/>
      <circle cx="92" cy="164" r="12" fill="url(#expertDim)"/>
      <circle cx="116" cy="164" r="12" fill="url(#expertDim)"/>
      <circle cx="140" cy="164" r="12" fill="url(#expertDim)"/>

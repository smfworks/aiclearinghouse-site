<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00CCFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00CCFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8800" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FF8800" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#76B900" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#76B900" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="expertActive" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#00CCFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00CCFF" stop-opacity="0.05"/>
    </radialGradient>
    <radialGradient id="expertDim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00CCFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00CCFF" stop-opacity="0.03"/>
    </radialGradient>
    <radialGradient id="sharedExpert" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8800" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF8800" stop-opacity="0.05"/>
    </radialGradient>
    <linearGradient id="streamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#76B900" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00CCFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00CCFF" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad)"/>

  <!-- Floating binary -->
  <g font-family="monospace" font-size="13" fill="#00CCFF" opacity="0.06">
    <text x="50" y="80">E2M1 0101 0110</text>
    <text x="200" y="120">1001 0011 FP8</text>
    <text x="80" y="200">0011 NVFP4</text>
    <text x="950" y="90">0110 MLA 512</text>
    <text x="1000" y="180">NextN 4B</text>
    <text x="850" y="250">200K ctx</text>
    <text x="100" y="550">0101 64 experts</text>
    <text x="900" y="500">MIT license</text>
  </g>

  <!-- Glow areas -->
  <ellipse cx="250" cy="340" rx="180" ry="120" fill="url(#greenGlow)"/>
  <ellipse cx="850" cy="300" rx="240" ry="160" fill="url(#cyanGlow)"/>
  <ellipse cx="850" cy="420" rx="150" ry="80" fill="url(#amberGlow)"/>

  <!-- DGX Spark (left side) -->
  <g transform="translate(80, 230)">
    <rect x="0" y="0" width="200" height="220" rx="8" fill="#111" stroke="#76B900" stroke-width="2" opacity="0.95"/>
    <line x1="15" y1="20" x2="185" y2="20" stroke="#333" stroke-width="2"/>
    <line x1="15" y1="30" x2="185" y2="30" stroke="#333" stroke-width="2"/>
    <line x1="15" y1="40" x2="185" y2="40" stroke="#333" stroke-width="2"/>
    <rect x="15" y="65" width="170" height="25" rx="3" fill="#76B900" opacity="0.15"/>
    <text x="100" y="82" font-family="sans-serif" font-size="11" fill="#76B900" text-anchor="middle" font-weight="bold">NVIDIA DGX SPARK</text>
    <circle cx="30" cy="110" r="4" fill="#76B900" opacity="1">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="45" cy="110" r="4" fill="#00CCFF" opacity="0.8"/>
    <rect x="15" y="135" width="170" height="65" rx="4" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
    <text x="100" y="153" font-family="monospace" font-size="10" fill="#76B900" text-anchor="middle">121 GB UNIFIED MEMORY</text>
    <rect x="25" y="162" width="150" height="8" rx="2" fill="#222"/>
    <rect x="25" y="162" width="116" height="8" rx="2" fill="#76B900" opacity="0.7"/>
    <text x="100" y="184" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">62 GB BF16 • 48 GB KV CACHE</text>
    <line x1="15" y1="210" x2="185" y2="210" stroke="#333" stroke-width="2"/>
  </g>

  <!-- Data streams -->
  <path d="M 280 320 Q 450 270, 600 300" stroke="url(#streamGrad)" stroke-width="3" fill="none" opacity="0.6">
    <animate attributeName="stroke-dashoffset" values="0;-30" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 280 360 Q 450 400, 600 360" stroke="url(#streamGrad)" stroke-width="2" fill="none" opacity="0.4">
    <animate attributeName="stroke-dashoffset" values="0;30" dur="2s" repeatCount="indefinite"/>
  </path>


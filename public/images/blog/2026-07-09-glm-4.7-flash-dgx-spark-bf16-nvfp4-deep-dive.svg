      <circle cx="188" cy="164" r="12" fill="url(#expertDim)"/>
      <!-- Row 8 -->
      <circle cx="20" cy="188" r="12" fill="url(#expertDim)"/>
      <circle cx="44" cy="188" r="12" fill="url(#expertDim)"/>
      <circle cx="68" cy="188" r="12" fill="url(#expertDim)"/>
      <circle cx="92" cy="188" r="12" fill="url(#expertDim)"/>
      <circle cx="116" cy="188" r="12" fill="url(#expertDim)"/>
      <circle cx="140" cy="188" r="12" fill="url(#expertDim)"/>
      <circle cx="164" cy="188" r="12" fill="url(#expertDim)"/>
      <circle cx="188" cy="188" r="12" fill="url(#expertDim)"/>
    </g>

    <!-- Shared expert (separate, amber) -->
    <circle cx="240" cy="104" r="20" fill="url(#sharedExpert)"/>
    <circle cx="240" cy="104" r="14" fill="none" stroke="#FF8800" stroke-width="2" opacity="0.7"/>
    <text x="240" y="108" font-family="sans-serif" font-size="10" fill="#FF8800" text-anchor="middle" font-weight="bold">SH</text>
    <text x="240" y="140" font-family="monospace" font-size="8" fill="#FF8800" text-anchor="middle">SHARED</text>
  </g>

  <!-- Router label -->
  <text x="470" y="310" font-family="sans-serif" font-size="11" fill="#00CCFF" text-anchor="middle" opacity="0.7">ROUTER</text>
  <text x="470" y="325" font-family="monospace" font-size="9" fill="#888" text-anchor="middle">4/64 + 1 shared</text>

  <!-- Stats panel (bottom left) -->
  <g transform="translate(50, 490)">
    <rect x="0" y="0" width="360" height="60" rx="6" fill="#0a0a0a" stroke="#333" stroke-width="1" opacity="0.8"/>
    <text x="15" y="20" font-family="monospace" font-size="10" fill="#76B900">106B params • 4B active/token (3.8%)</text>
    <text x="15" y="35" font-family="monospace" font-size="10" fill="#00CCFF">MLA attention • NextN multi-token prediction</text>
    <text x="15" y="50" font-family="monospace" font-size="10" fill="#FF8800">62 GB BF16 → 18 GB NVFP4 (3.51×) • 200K context</text>
  </g>

  <!-- Benchmark results panel (bottom right) -->
  <g transform="translate(820, 490)">
    <rect x="0" y="0" width="330" height="60" rx="6" fill="#0a0a0a" stroke="#333" stroke-width="1" opacity="0.8"/>
    <text x="15" y="20" font-family="monospace" font-size="10" fill="#76B900">AGENTIC: 100% (16/16) ✅</text>
    <text x="15" y="35" font-family="monospace" font-size="10" fill="#00CCFF">REASONING: 73.7% • MATH: 36.7%</text>
    <text x="15" y="50" font-family="monospace" font-size="10" fill="#FF8800">OVERALL: 34.8% (63/181) • BF16</text>
  </g>

  <!-- Title overlay -->
  <rect x="0" y="580" width="1200" height="95" fill="#000" opacity="0.85"/>
  <line x1="0" y1="580" x2="1200" y2="580" stroke="#00CCFF" stroke-width="1" opacity="0.3"/>
  <text x="600" y="615" font-family="sans-serif" font-size="22" fill="#00CCFF" text-anchor="middle" font-weight="bold" letter-spacing="3">GLM-4.7-FLASH • BF16 • DGX SPARK</text>
  <text x="600" y="642" font-family="sans-serif" font-size="12" fill="#888" text-anchor="middle" letter-spacing="1">4B Active Parameters, 200K Context — Plus the NVFP4 MARLIN Bug</text>
  <text x="600" y="660" font-family="monospace" font-size="10" fill="#666" text-anchor="middle">SMF WORKS • smf-bench 181-test suite • Day 3 • Zhipu AI • MIT</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">Abstract resource isolation architecture</title>
  <desc id="hero-desc">Nested navy control groups contain orange agent nodes and a teal local inference core connected by bounded resource channels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06101f"/>
      <stop offset="55%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#102746"/>
    </linearGradient>
    <radialGradient id="glow-teal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.65"/>
      <stop offset="55%" stop-color="#0e7490" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-gold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.58"/>
      <stop offset="60%" stop-color="#ff6b00" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff6b00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#ff6b00"/>
    </linearGradient>
    <linearGradient id="inference" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#93c5fd" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="node-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000814" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="870" cy="310" rx="300" ry="270" fill="url(#glow-teal)" filter="url(#soft)"/>
  <ellipse cx="310" cy="340" rx="270" ry="250" fill="url(#glow-gold)" filter="url(#soft)"/>

  <rect x="72" y="58" width="1056" height="514" rx="54" fill="#0b1c32" fill-opacity="0.64" stroke="#60a5fa" stroke-opacity="0.24" stroke-width="2"/>
  <rect x="104" y="92" width="992" height="446" rx="42" fill="#0a1628" fill-opacity="0.72" stroke="#3b82f6" stroke-opacity="0.34" stroke-width="2" stroke-dasharray="10 12"/>

  <rect x="142" y="132" width="472" height="366" rx="34" fill="#111f35" fill-opacity="0.78" stroke="#f59e0b" stroke-opacity="0.66" stroke-width="3"/>
  <rect x="662" y="132" width="396" height="366" rx="34" fill="#0b2434" fill-opacity="0.8" stroke="#22d3ee" stroke-opacity="0.66" stroke-width="3"/>

  <path d="M614 238 C638 238 638 238 662 238" fill="none" stroke="#f59e0b" stroke-width="7" stroke-linecap="round" opacity="0.92"/>
  <path d="M614 315 C638 315 638 315 662 315" fill="none" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" opacity="0.84"/>
  <path d="M614 392 C638 392 638 392 662 392" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.68"/>
  <circle cx="638" cy="238" r="11" fill="#0a1628" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="638" cy="315" r="11" fill="#0a1628" stroke="#22d3ee" stroke-width="3"/>
  <circle cx="638" cy="392" r="11" fill="#0a1628" stroke="#fb923c" stroke-width="3"/>

  <g filter="url(#node-shadow)">
    <rect x="190" y="178" width="156" height="92" rx="22" fill="#0b1729" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="232" cy="224" r="18" fill="url(#agent)"/>
    <path d="M276 210h42M276 226h56M276 242h34" stroke="#f8d58c" stroke-opacity="0.78" stroke-width="7" stroke-linecap="round"/>

    <rect x="190" y="294" width="156" height="92" rx="22" fill="#0b1729" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="232" cy="340" r="18" fill="url(#agent)"/>
    <path d="M276 326h48M276 342h36M276 358h54" stroke="#f8d58c" stroke-opacity="0.78" stroke-width="7" stroke-linecap="round"/>

    <rect x="388" y="236" width="174" height="92" rx="22" fill="#0b1729" stroke="#fb923c" stroke-width="2"/>
    <circle cx="430" cy="282" r="18" fill="url(#agent)"/>
    <path d="M474 268h52M474 284h62M474 300h42" stroke="#f8d58c" stroke-opacity="0.78" stroke-width="7" stroke-linecap="round"/>

    <rect x="388" y="352" width="174" height="92" rx="22" fill="#0b1729" stroke="#fb923c" stroke-width="2"/>
    <circle cx="430" cy="398" r="18" fill="url(#agent)"/>
    <path d="M474 384h60M474 400h42M474 416h54" stroke="#f8d58c" stroke-opacity="0.78" stroke-width="7" stroke-linecap="round"/>
  </g>

  <path d="M346 224H388M346 340H366V282H388M346 340H388M346 340H366V398H388" fill="none" stroke="#fb923c" stroke-opacity="0.5" stroke-width="3"/>

  <g filter="url(#node-shadow)">
    <circle cx="860" cy="304" r="112" fill="#071725" stroke="#22d3ee" stroke-width="3"/>
    <circle cx="860" cy="304" r="82" fill="none" stroke="#38bdf8" stroke-opacity="0.48" stroke-width="10" stroke-dasharray="22 14"/>
    <circle cx="860" cy="304" r="50" fill="url(#inference)"/>
    <path d="M836 276h48M828 296h64M828 316h64M836 336h48" stroke="#d9f8ff" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  </g>

  <g opacity="0.92">
    <rect x="714" y="438" width="292" height="20" rx="10" fill="#071725" stroke="#1e3a8a"/>
    <rect x="714" y="438" width="196" height="20" rx="10" fill="url(#inference)"/>
    <circle cx="910" cy="448" r="12" fill="#fbbf24"/>
  </g>

  <g opacity="0.55">
    <circle cx="110" cy="114" r="5" fill="#60a5fa"/>
    <circle cx="1090" cy="114" r="5" fill="#22d3ee"/>
    <circle cx="110" cy="516" r="5" fill="#f59e0b"/>
    <circle cx="1090" cy="516" r="5" fill="#60a5fa"/>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Local inference architecture: Hermes orchestrates subagents on AMD ROCm GPUs via Ollama">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f18"/>
      <stop offset="50%" stop-color="#0d1523"/>
      <stop offset="100%" stop-color="#0a0f18"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b00"/>
      <stop offset="100%" stop-color="#ff8f33"/>
    </linearGradient>
    <linearGradient id="rocm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="host" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- faint mesh grid -->
  <g stroke="#162236" stroke-width="1" opacity="0.4">
    <line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="490" x2="1200" y2="490"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- top orchestrator: Hermes broker/planner -->
  <g transform="translate(450, 60)" opacity="0.96">
    <rect x="0" y="0" width="300" height="70" rx="14" fill="#0d1421" stroke="#26354a" stroke-width="2"/>
    <circle cx="24" cy="35" r="8" fill="#00d4ff" filter="url(#glow)"/>
    <text x="52" y="41" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f0f4fa">Hermes Broker</text>
    <text x="232" y="41" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#7d90aa">planner + governance</text>
  </g>

  <!-- downward routing arrows -->
  <g fill="none" stroke="#4b5c73" stroke-width="2" stroke-dasharray="6 4" opacity="0.7">
    <path d="M600,130 L300,210"/>
    <path d="M600,130 L600,210"/>
    <path d="M600,130 L900,210"/>
  </g>

  <!-- left: local ROCm node -->
  <g transform="translate(120, 200)" opacity="0.95">
    <rect x="0" y="0" width="360" height="260" rx="14" fill="#0d1421" stroke="#3f2a2a" stroke-width="2"/>
    <text x="180" y="30" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#ef4444">Local ROCm Node</text>

    <!-- GPU cards -->
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="150" height="90" rx="8" fill="#1a1010" stroke="#ef4444" stroke-width="1.5" opacity="0.9"/>
      <text x="75" y="28" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#fca5a5">AMD MI210</text>
      <text x="75" y="50" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#b89aa6">64 GB HBM2e</text>
      <text x="75" y="72" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#ef4444">GPU 0</text>
    </g>
    <g transform="translate(190, 55)">
      <rect x="0" y="0" width="150" height="90" rx="8" fill="#1a1010" stroke="#ef4444" stroke-width="1.5" opacity="0.9"/>
      <text x="75" y="28" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#fca5a5">AMD MI100</text>
      <text x="75" y="50" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#b89aa6">32 GB HBM2</text>
      <text x="75" y="72" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#ef4444">GPU 1</text>
    </g>

    <!-- Ollama label -->
    <g transform="translate(20, 165)">
      <rect x="0" y="0" width="320" height="70" rx="8" fill="#151e2e" stroke="#26354a" stroke-width="1.5"/>
      <text x="160" y="28" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#00d4ff">ollama serve</text>
      <text x="160" y="50" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9fb0c7">qwen3.6:27b-q4_K_M · llama3.3:70b-q4</text>
    </g>
  </g>

  <!-- center: routing decision -->
  <g transform="translate(500, 200)" opacity="0.96">
    <rect x="0" y="0" width="200" height="260" rx="14" fill="#0d1421" stroke="#2a3f4f" stroke-width="2"/>
    <text x="100" y="30" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#f0f4fa">Model Router</text>

    <text x="100" y="70" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9fb0c7">latency &lt; 300 ms?</text>
    <text x="100" y="95" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#00d4ff">VRAM fit?</text>
    <text x="100" y="120" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9fb0c7">risk class OK?</text>

    <path d="M40,150 L100,190 L160,150" fill="none" stroke="#4b5c73" stroke-width="2"/>
    <text x="100" y="218" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#ff6b00">local first</text>
    <text x="100" y="240" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#7d90aa">cloud fallback</text>
  </g>

  <!-- right: cloud fallback -->
  <g transform="translate(720, 200)" opacity="0.92">
    <rect x="0" y="0" width="360" height="260" rx="14" fill="#0d1421" stroke="#2a2d3f" stroke-width="2"/>
    <text x="180" y="30" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#f0f4fa">Cloud Fallback</text>

    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="320" height="70" rx="8" fill="#151e2e" stroke="#26354a" stroke-width="1.5"/>
      <text x="160" y="30" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#ff6b00">OpenRouter / DeepSeek</text>
      <text x="160" y="52" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9fb0c7">frontier models · 4k+ context</text>
    </g>

    <g transform="translate(20, 145)">
      <rect x="0" y="0" width="320" height="90" rx="8" fill="#151e2e" stroke="#26354a" stroke-width="1.5"/>
      <text x="160" y="32" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#7d90aa">subagent results</text>
      <text x="160" y="58" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9fb0c7">streaming JSON · structured outputs</text>
    </g>
  </g>

  <!-- bottom title -->
  <text x="600" y="520" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="700" fill="#f0f4fa">Local Inference at Scale</text>
  <text x="600" y="565" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#7d90aa">Hermes subagents on AMD ROCm + Ollama</text>

  <text x="600" y="605" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#4b5c73">SMF Clearinghouse · Liam's Landing</text>
</svg>
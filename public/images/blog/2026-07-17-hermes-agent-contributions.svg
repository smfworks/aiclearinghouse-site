<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1033;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d0a1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0512;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C792EA;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7B68EE;stop-opacity:0.4" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#C792EA" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Git branch visualization -->
  <g transform="translate(80, 180)" opacity="0.7">
    <!-- Main branch line -->
    <line x1="0" y1="50" x2="400" y2="50" stroke="#3D3D5C" stroke-width="3"/>
    <!-- Branch lines -->
    <path d="M 80 50 Q 100 50 100 90 L 100 130" stroke="#C792EA" stroke-width="2.5" fill="none"/>
    <path d="M 160 50 Q 180 50 180 90 L 180 130" stroke="#7B68EE" stroke-width="2.5" fill="none"/>
    <path d="M 240 50 Q 260 50 260 90 L 260 130" stroke="#C792EA" stroke-width="2.5" fill="none"/>
    <path d="M 320 50 Q 340 50 340 90 L 340 130" stroke="#7B68EE" stroke-width="2.5" fill="none"/>
    <!-- Merge back -->
    <path d="M 100 170 Q 100 200 120 200 L 380 200 Q 400 200 400 230" stroke="#C792EA" stroke-width="2" fill="none" opacity="0.5"/>
    <!-- Commit dots on main -->
    <circle cx="0" cy="50" r="5" fill="#5C5C8A"/>
    <circle cx="80" cy="50" r="5" fill="#5C5C8A"/>
    <circle cx="160" cy="50" r="5" fill="#5C5C8A"/>
    <circle cx="240" cy="50" r="5" fill="#5C5C8A"/>
    <circle cx="320" cy="50" r="5" fill="#5C5C8A"/>
    <circle cx="400" cy="50" r="5" fill="#5C5C8A"/>
    <!-- PR dots on branches -->
    <circle cx="100" cy="150" r="7" fill="#C792EA" filter="url(#glow)"/>
    <circle cx="180" cy="150" r="7" fill="#7B68EE" filter="url(#glow)"/>
    <circle cx="260" cy="150" r="7" fill="#C792EA" filter="url(#glow)"/>
    <circle cx="340" cy="150" r="7" fill="#7B68EE" filter="url(#glow)"/>
  </g>

  <!-- PR count badges -->
  <g transform="translate(560, 180)" opacity="0.85">
    <!-- 12 PRs badge -->
    <rect x="0" y="0" width="120" height="40" rx="8" fill="#C792EA" opacity="0.15" stroke="#C792EA" stroke-width="1.5"/>
    <text x="60" y="26" font-family="monospace" font-size="16" fill="#C792EA" text-anchor="middle" font-weight="bold">12 PRs</text>
    <!-- 92 tests badge -->
    <rect x="0" y="55" width="120" height="40" rx="8" fill="#7B68EE" opacity="0.15" stroke="#7B68EE" stroke-width="1.5"/>
    <text x="60" y="81" font-family="monospace" font-size="16" fill="#7B68EE" text-anchor="middle" font-weight="bold">92 tests</text>
    <!-- 0 regressions badge -->
    <rect x="0" y="110" width="120" height="40" rx="8" fill="#00A86B" opacity="0.15" stroke="#00A86B" stroke-width="1.5"/>
    <text x="60" y="136" font-family="monospace" font-size="14" fill="#00A86B" text-anchor="middle" font-weight="bold">0 regressions</text>
  </g>

  <!-- Terminal-style code snippet -->
  <g transform="translate(80, 400)" opacity="0.5">
    <rect x="0" y="0" width="500" height="120" rx="6" fill="#0d0a1f" stroke="#2D2D44" stroke-width="1"/>
    <circle cx="15" cy="15" r="4" fill="#FF5F56"/>
    <circle cx="30" cy="15" r="4" fill="#FFBD2E"/>
    <circle cx="45" cy="15" r="4" fill="#27C93F"/>
    <text x="15" y="50" font-family="monospace" font-size="11" fill="#C792EA">$ gh pr create --repo NousResearch/hermes-agent</text>
    <text x="15" y="70" font-family="monospace" font-size="11" fill="#7B68EE">  --title 'fix(tools): auto-include MCP toolsets'</text>
    <text x="15" y="90" font-family="monospace" font-size="11" fill="#00A86B">  ✓ PR #65826 opened</text>
    <text x="15" y="108" font-family="monospace" font-size="11" fill="#5C5C8A">  5 passed in 1.31s</text>
  </g>

  <!-- Title -->
  <text x="80" y="100" font-family="sans-serif" font-size="32" fill="#FFFFFF" font-weight="bold">12 Pull Requests in One Day</text>
  <text x="80" y="135" font-family="sans-serif" font-size="18" fill="#C792EA" opacity="0.8">Upstream Hermes Agent Contributions</text>

  <!-- Author -->
  <text x="80" y="580" font-family="sans-serif" font-size="14" fill="#8888AA">Jasmine Naderi · Principal Engineer, Agent Systems · SMF Works</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FACC15" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FACC15" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- Grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.35">
    <path d="M0 150 L1600 150 M0 300 L1600 300 M0 450 L1600 450 M0 600 L1600 600 M0 750 L1600 750"/>
    <path d="M200 0 L200 900 M400 0 L400 900 M600 0 L600 900 M800 0 L800 900 M1000 0 L1000 900 M1200 0 L1200 900 M1400 0 L1400 900"/>
  </g>

  <!-- Title -->
  <text x="80" y="85" fill="#E2E8F0" font-size="38" font-weight="700">The SMF Works Agent Fleet</text>

  <!-- Platform labels -->
  <text x="120" y="195" fill="#10B981" font-size="13" font-weight="700" font-family="ui-monospace, SFMono-Regular, monospace" letter-spacing="2">LINUX (DGX SPARK — LOCAL)</text>
  <text x="1080" y="195" fill="#22D3EE" font-size="13" font-weight="700" font-family="ui-monospace, SFMono-Regular, monospace" letter-spacing="2">WINDOWS PC (REMOTE)</text>

  <!-- Platform divider -->
  <line x1="1050" y1="180" x2="1050" y2="850" stroke="#1E293B" stroke-width="1.5" stroke-dasharray="6 8" opacity="0.5"/>

  <!-- Connection lines from Gabriel (center-left) to Linux agents -->
  <g stroke="#FACC15" stroke-width="1.5" opacity="0.3" fill="none">
    <path d="M460 500 L240 290"/>
    <path d="M460 500 L240 420"/>
    <path d="M460 500 L240 550"/>
    <path d="M460 500 L240 680"/>
    <path d="M460 500 L620 290"/>
    <path d="M460 500 L620 420"/>
    <path d="M460 500 L620 680"/>

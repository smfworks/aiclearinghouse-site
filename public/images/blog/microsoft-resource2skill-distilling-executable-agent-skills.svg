<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="624" viewBox="0 0 1200 624">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#12121a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="624" fill="url(#bg)"/>

  <!-- Pipeline flow: Resource -> Distill -> Skill -> Agent -> Output -->
  <g font-family="monospace" font-size="14" fill="#C9A96E" fill-opacity="0.5">
    <!-- Stage boxes -->
    <rect x="60" y="260" width="140" height="50" rx="6" fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="130" y="290" text-anchor="middle">YouTube</text>

    <rect x="260" y="260" width="140" height="50" rx="6" fill="none" stroke="#ea580c" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="330" y="290" text-anchor="middle">Distill</text>

    <rect x="460" y="260" width="140" height="50" rx="6" fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="530" y="290" text-anchor="middle">Skill</text>

    <rect x="660" y="260" width="140" height="50" rx="6" fill="none" stroke="#ea580c" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="730" y="290" text-anchor="middle">Agent</text>

    <rect x="860" y="260" width="140" height="50" rx="6" fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="930" y="290" text-anchor="middle">Output</text>

    <!-- Arrows -->
    <line x1="200" y1="285" x2="260" y2="285" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.3"/>
    <polygon points="258,282 264,285 258,288" fill="#C9A96E" fill-opacity="0.3"/>
    <line x1="400" y1="285" x2="460" y2="285" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.3"/>
    <polygon points="458,282 464,285 458,288" fill="#C9A96E" fill-opacity="0.3"/>
    <line x1="600" y1="285" x2="660" y2="285" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.3"/>
    <polygon points="658,282 664,285 658,288" fill="#C9A96E" fill-opacity="0.3"/>
    <line x1="800" y1="285" x2="860" y2="285" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.3"/>
    <polygon points="858,282 864,285 858,288" fill="#C9A96E" fill-opacity="0.3"/>

    <!-- Labels above -->
    <text x="130" y="235" text-anchor="middle" font-size="11" fill-opacity="0.3">SOURCE</text>
    <text x="330" y="235" text-anchor="middle" font-size="11" fill-opacity="0.3">EXTRACT</text>
    <text x="530" y="235" text-anchor="middle" font-size="11" fill-opacity="0.3">STORE</text>
    <text x="730" y="235" text-anchor="middle" font-size="11" fill-opacity="0.3">EXECUTE</text>
    <text x="930" y="235" text-anchor="middle" font-size="11" fill-opacity="0.3">ARTIFACT</text>
  </g>

  <!-- Feedback loop arrow -->
  <path d="M 930 310 Q 930 400 530 400 Q 130 400 130 310" fill="none" stroke="#ea580c" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="4,4"/>
  <text x="530" y="420" text-anchor="middle" font-size="11" fill="#ea580c" fill-opacity="0.3">self-evolution feedback loop</text>

  <!-- Corner accents -->
  <line x1="0" y1="0" x2="60" y2="0" stroke="#C9A96E" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="0" y1="0" x2="0" y2="60" stroke="#C9A96E" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="1140" y1="624" x2="1200" y2="624" stroke="#ea580c" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="1200" y1="564" x2="1200" y2="624" stroke="#ea580c" stroke-width="2" stroke-opacity="0.3"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <!-- NVIDIA green glow -->
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#76B900" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#76B900" stop-opacity="0"/>
    </radialGradient>
    <!-- Amber glow for data streams -->
    <radialGradient id="amberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9500" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF9500" stop-opacity="0"/>
    </radialGradient>
    <!-- Blue glow -->
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00AAFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00AAFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Expert node gradient -->
    <radialGradient id="expertDim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#76B900" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#76B900" stop-opacity="0.1"/>
    </radialGradient>
    <radialGradient id="expertActive" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#76B900" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#76B900" stop-opacity="0.1"/>
    </radialGradient>
    <!-- Data stream gradient -->
    <linearGradient id="streamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#76B900" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FF9500" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00AAFF" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="streamGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00AAFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00AAFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#76B900" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad)"/>

  <!-- Floating binary digits background -->
  <g font-family="monospace" font-size="14" fill="#76B900" opacity="0.08">
    <text x="50" y="80">0101 0110 1001</text>
    <text x="200" y="120">1100 0011 1010</text>
    <text x="80" y="200">0011 1001 0101</text>
    <text x="950" y="90">0110 0101 1100</text>
    <text x="1000" y="180">1001 0011 0101</text>
    <text x="850" y="250">0101 1100 0011</text>
    <text x="100" y="550">1100 0101 1001</text>
    <text x="900" y="500">0011 0101 1110</text>
    <text x="1050" y="550">1001 0110 0011</text>
    <text x="300" y="600">0101 0011 1010</text>
  </g>

  <!-- Glow areas -->
  <ellipse cx="250" cy="340" rx="180" ry="120" fill="url(#greenGlow)"/>
  <ellipse cx="850" cy="340" rx="220" ry="150" fill="url(#amberGlow)"/>
  <ellipse cx="600" cy="340" rx="150" ry="100" fill="url(#blueGlow)"/>

  <!-- DGX Spark representation (left side) -->
  <g transform="translate(80, 230)">
    <!-- Main chassis -->
    <rect x="0" y="0" width="200" height="220" rx="8" fill="#111" stroke="#76B900" stroke-width="2" opacity="0.95"/>
    <!-- Ventilation slots -->
    <line x1="15" y1="20" x2="185" y2="20" stroke="#333" stroke-width="2"/>
    <line x1="15" y1="30" x2="185" y2="30" stroke="#333" stroke-width="2"/>
    <line x1="15" y1="40" x2="185" y2="40" stroke="#333" stroke-width="2"/>
    <line x1="15" y1="50" x2="185" y2="50" stroke="#333" stroke-width="2"/>
    <!-- NVIDIA logo area -->
    <rect x="15" y="70" width="170" height="25" rx="3" fill="#76B900" opacity="0.15"/>
    <text x="100" y="87" font-family="sans-serif" font-size="11" fill="#76B900" text-anchor="middle" font-weight="bold">NVIDIA DGX SPARK</text>
    <!-- Status LEDs -->
    <circle cx="30" cy="115" r="4" fill="#76B900" opacity="1">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="45" cy="115" r="4" fill="#00AAFF" opacity="0.8"/>
    <circle cx="60" cy="115" r="4" fill="#FF9500" opacity="0.6"/>
    <!-- Memory indicator -->
    <rect x="15" y="140" width="170" height="60" rx="4" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
    <text x="100" y="158" font-family="monospace" font-size="10" fill="#76B900" text-anchor="middle">121 GB UNIFIED MEMORY</text>
    <!-- Memory bar -->
    <rect x="25" y="168" width="150" height="8" rx="2" fill="#222"/>
    <rect x="25" y="168" width="111" height="8" rx="2" fill="#76B900" opacity="0.8"/>
    <text x="100" y="188" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">74 GB NVFP4 • 31 GB KV CACHE</text>
    <!-- Bottom vent -->
    <line x1="15" y1="210" x2="185" y2="210" stroke="#333" stroke-width="2"/>
    <line x1="15" y1="200" x2="185" y2="200" stroke="#333" stroke-width="2"/>
  </g>

  <!-- Data streams from DGX to expert nodes -->
  <path d="M 280 340 Q 450 280, 600 340 T 720 340" stroke="url(#streamGrad)" stroke-width="3" fill="none" opacity="0.7">
    <animate attributeName="stroke-dashoffset" values="0;-30" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 280 360 Q 450 420, 600 360 T 720 360" stroke="url(#streamGrad2)" stroke-width="2" fill="none" opacity="0.5">
    <animate attributeName="stroke-dashoffset" values="0;30" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 280 300 Q 450 250, 600 300 T 720 300" stroke="url(#streamGrad2)" stroke-width="2" fill="none" opacity="0.4">
    <animate attributeName="stroke-dashoffset" values="0;-20" dur="1.8s" repeatCount="indefinite"/>
  </path>

  <!-- 8 Expert Nodes (right side) - arranged in a 4x2 grid -->
  <g transform="translate(750, 150)">
    <!-- Row 1 -->
    <!-- Expert 1 (active - bright) -->
    <circle cx="60" cy="50" r="45" fill="url(#expertActive)"/>
    <circle cx="60" cy="50" r="28" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
    <text x="60" y="55" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">E1</text>
    <text x="60" y="105" font-family="monospace" font-size="9" fill="#76B900" text-anchor="middle">ACTIVE</text>

    <!-- Expert 2 (dim) -->
    <circle cx="170" cy="50" r="38" fill="url(#expertDim)"/>
    <circle cx="170" cy="50" r="22" fill="none" stroke="#76B900" stroke-width="1" opacity="0.5"/>
    <text x="170" y="55" font-family="sans-serif" font-size="12" fill="#76B900" text-anchor="middle" opacity="0.7">E2</text>

    <!-- Expert 3 (dim) -->
    <circle cx="280" cy="50" r="38" fill="url(#expertDim)"/>
    <circle cx="280" cy="50" r="22" fill="none" stroke="#76B900" stroke-width="1" opacity="0.5"/>
    <text x="280" y="55" font-family="sans-serif" font-size="12" fill="#76B900" text-anchor="middle" opacity="0.7">E3</text>

    <!-- Expert 4 (dim) -->
    <circle cx="390" cy="50" r="38" fill="url(#expertDim)"/>
    <circle cx="390" cy="50" r="22" fill="none" stroke="#76B900" stroke-width="1" opacity="0.5"/>
    <text x="390" y="55" font-family="sans-serif" font-size="12" fill="#76B900" text-anchor="middle" opacity="0.7">E4</text>

    <!-- Row 2 -->
    <!-- Expert 5 (dim) -->
    <circle cx="60" cy="170" r="38" fill="url(#expertDim)"/>
    <circle cx="60" cy="170" r="22" fill="none" stroke="#76B900" stroke-width="1" opacity="0.5"/>
    <text x="60" y="175" font-family="sans-serif" font-size="12" fill="#76B900" text-anchor="middle" opacity="0.7">E5</text>

    <!-- Expert 6 (active - bright) -->
    <circle cx="170" cy="170" r="45" fill="url(#expertActive)"/>
    <circle cx="170" cy="170" r="28" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
    <text x="170" y="175" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">E6</text>
    <text x="170" y="225" font-family="monospace" font-size="9" fill="#76B900" text-anchor="middle">ACTIVE</text>

    <!-- Expert 7 (dim) -->
    <circle cx="280" cy="170" r="38" fill="url(#expertDim)"/>
    <circle cx="280" cy="170" r="22" fill="none" stroke="#76B900" stroke-width="1" opacity="0.5"/>
    <text x="280" y="175" font-family="sans-serif" font-size="12" fill="#76B900" text-anchor="middle" opacity="0.7">E7</text>

    <!-- Expert 8 (dim) -->
    <circle cx="390" cy="170" r="38" fill="url(#expertDim)"/>
    <circle cx="390" cy="170" r="22" fill="none" stroke="#76B900" stroke-width="1" opacity="0.5"/>
    <text x="390" y="175" font-family="sans-serif" font-size="12" fill="#76B900" text-anchor="middle" opacity="0.7">E8</text>

    <!-- Connection lines between experts -->
    <line x1="60" y1="50" x2="170" y2="170" stroke="#76B900" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>
    <line x1="170" y1="50" x2="60" y2="170" stroke="#76B900" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>
    <line x1="280" y1="50" x2="390" y2="170" stroke="#76B900" stroke-width="1" opacity="0.15" stroke-dasharray="4,4"/>
    <line x1="390" y1="50" x2="280" y2="170" stroke="#76B900" stroke-width="1" opacity="0.15" stroke-dasharray="4,4"/>
  </g>

  <!-- Router label -->
  <text x="600" y="340" font-family="sans-serif" font-size="11" fill="#FF9500" text-anchor="middle" opacity="0.7">ROUTER</text>
  <text x="600" y="355" font-family="monospace" font-size="9" fill="#888" text-anchor="middle">2/8 active</text>

  <!-- Stats panel (bottom left) -->
  <g transform="translate(50, 490)">
    <rect x="0" y="0" width="340" height="60" rx="6" fill="#0a0a0a" stroke="#333" stroke-width="1" opacity="0.8"/>
    <text x="15" y="20" font-family="monospace" font-size="10" fill="#76B900">141B params → 74 GB NVFP4</text>
    <text x="15" y="35" font-family="monospace" font-size="10" fill="#FF9500">39B active/token • 56 layers</text>
    <text x="15" y="50" font-family="monospace" font-size="10" fill="#00AAFF">W4A4 • 73.6% compression</text>
  </g>

  <!-- Benchmark results panel (bottom right) -->
  <g transform="translate(820, 490)">
    <rect x="0" y="0" width="330" height="60" rx="6" fill="#0a0a0a" stroke="#333" stroke-width="1" opacity="0.8"/>
    <text x="15" y="20" font-family="monospace" font-size="10" fill="#76B900">AGENTIC: 100% (16/16) ✅</text>
    <text x="15" y="35" font-family="monospace" font-size="10" fill="#FF9500">CODING: 0% (0/30) ❌</text>
    <text x="15" y="50" font-family="monospace" font-size="10" fill="#00AAFF">OVERALL: 40.9% (74/181)</text>
  </g>

  <!-- Title overlay at bottom -->
  <rect x="0" y="580" width="1200" height="95" fill="#000" opacity="0.85"/>
  <line x1="0" y1="580" x2="1200" y2="580" stroke="#76B900" stroke-width="1" opacity="0.3"/>
  <text x="600" y="615" font-family="sans-serif" font-size="22" fill="#76B900" text-anchor="middle" font-weight="bold" letter-spacing="3">MIXTRAL 8x22B • NVFP4 • DGX SPARK</text>
  <text x="600" y="642" font-family="sans-serif" font-size="12" fill="#888" text-anchor="middle" letter-spacing="1">The Agentic Paradox — 100% on Apps, 0% on Code</text>
  <text x="600" y="660" font-family="monospace" font-size="10" fill="#666" text-anchor="middle">SMF WORKS • smf-bench 181-test suite • Day 2</text>
</svg>
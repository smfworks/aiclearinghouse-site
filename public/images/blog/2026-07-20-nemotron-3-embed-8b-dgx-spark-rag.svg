<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="624" viewBox="0 0 1200 624">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="55%" stop-color="#0c1520"/>
      <stop offset="100%" stop-color="#06141e"/>
    </linearGradient>
    <linearGradient id="chipGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#76b900" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4aa"/>
    </marker>
  </defs>
  <rect width="1200" height="624" fill="url(#bg)"/>
  <!-- grid -->
  <g stroke="#1a2a3a" stroke-opacity="0.35" stroke-width="1">
    <path d="M0 78 H1200 M0 156 H1200 M0 234 H1200 M0 312 H1200 M0 390 H1200 M0 468 H1200 M0 546 H1200"/>
    <path d="M100 0 V624 M200 0 V624 M300 0 V624 M400 0 V624 M500 0 V624 M600 0 V624 M700 0 V624 M800 0 V624 M900 0 V624 M1000 0 V624 M1100 0 V624"/>
  </g>

  <!-- title -->
  <text x="56" y="58" fill="#e8eef4" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700">Nemotron-3-Embed-8B on DGX Spark</text>
  <text x="56" y="92" fill="#5a8a6a" font-family="SF Mono, Courier New, monospace" font-size="16">vLLM 0.24 · dim 4096 · BF16 · BEIR + speed + Praxis RAG</text>

  <!-- GB10 chip -->
  <g filter="url(#glow)">
    <rect x="70" y="140" width="280" height="220" rx="18" fill="#101820" stroke="#76b900" stroke-width="2"/>
    <rect x="90" y="160" width="240" height="140" rx="10" fill="url(#chipGlow)" stroke="#76b900" stroke-opacity="0.6"/>
    <text x="210" y="230" text-anchor="middle" fill="#e8eef4" font-family="SF Mono, monospace" font-size="18" font-weight="700">GB10</text>
    <text x="210" y="258" text-anchor="middle" fill="#76b900" font-family="SF Mono, monospace" font-size="13">Grace Blackwell UMA</text>
    <text x="210" y="330" text-anchor="middle" fill="#8aa" font-family="SF Mono, monospace" font-size="12">spark-56bc · :8889</text>
  </g>

  <!-- arrow -->
  <line x1="370" y1="250" x2="470" y2="250" stroke="#00d4aa" stroke-width="3" marker-end="url(#arrowhead)" filter="url(#glow)"/>
  <text x="420" y="232" text-anchor="middle" fill="#00d4aa" font-family="SF Mono, monospace" font-size="11">embed</text>

  <!-- model block -->
  <rect x="490" y="150" width="300" height="200" rx="14" fill="#101820" stroke="#00d4aa" stroke-width="2"/>
  <text x="640" y="190" text-anchor="middle" fill="#e8eef4" font-family="SF Pro Display, Arial, sans-serif" font-size="18" font-weight="700">Nemotron-3-Embed-8B</text>
  <text x="640" y="218" text-anchor="middle" fill="#00d4aa" font-family="SF Mono, monospace" font-size="13">BF16 · Ministral-3 encoder</text>
  <text x="640" y="250" text-anchor="middle" fill="#8aa" font-family="SF Mono, monospace" font-size="12">avg pool · bi-attn · L2 norm</text>
  <text x="640" y="280" text-anchor="middle" fill="#e8eef4" font-family="SF Mono, monospace" font-size="22" font-weight="700">4096-d</text>
  <text x="640" y="310" text-anchor="middle" fill="#5a8a6a" font-family="SF Mono, monospace" font-size="12">query: / passage:</text>

  <!-- metrics bars right -->
  <g font-family="SF Mono, monospace">
    <text x="860" y="170" fill="#5a8a6a" font-size="11">QUERY LATENCY</text>
    <text x="860" y="200" fill="#76b900" font-size="36" font-weight="700">75ms</text>
    <text x="860" y="250" fill="#5a8a6a" font-size="11">BEIR MACRO nDCG@10</text>
    <text x="860" y="280" fill="#00d4aa" font-size="36" font-weight="700">0.716</text>
    <text x="860" y="330" fill="#5a8a6a" font-size="11">PRAXIS SYNTH nDCG@10</text>
    <text x="860" y="360" fill="#e8eef4" font-size="36" font-weight="700">0.975</text>
  </g>

  <!-- BEIR mini bars -->
  <g transform="translate(70,400)">
    <text x="0" y="0" fill="#5a8a6a" font-family="SF Mono, monospace" font-size="12">BEIR nDCG@10</text>
    <!-- SciFact 0.834 -->
    <rect x="0" y="20" width="176" height="14" rx="3" fill="#76b900" opacity="0.9"/>
    <text x="184" y="32" fill="#aaa" font-family="SF Mono, monospace" font-size="11">SciFact 0.83</text>
    <!-- Quora 0.884 -->
    <rect x="0" y="44" width="186" height="14" rx="3" fill="#00d4aa" opacity="0.9"/>
    <text x="194" y="56" fill="#aaa" font-family="SF Mono, monospace" font-size="11">Quora 0.88</text>
    <!-- TREC 0.866 -->
    <rect x="0" y="68" width="182" height="14" rx="3" fill="#76b900" opacity="0.75"/>
    <text x="190" y="80" fill="#aaa" font-family="SF Mono, monospace" font-size="11">TRECCOVID 0.87</text>
    <!-- FiQA 0.656 -->
    <rect x="0" y="92" width="138" height="14" rx="3" fill="#00d4aa" opacity="0.7"/>
    <text x="146" y="104" fill="#aaa" font-family="SF Mono, monospace" font-size="11">FiQA 0.66</text>
    <!-- ArguAna 0.631 -->
    <rect x="0" y="116" width="132" height="14" rx="3" fill="#76b900" opacity="0.55"/>
    <text x="140" y="128" fill="#aaa" font-family="SF Mono, monospace" font-size="11">ArguAna 0.63</text>
    <!-- NFCorpus 0.423 -->
    <rect x="0" y="140" width="89" height="14" rx="3" fill="#ff9500" opacity="0.85"/>
    <text x="98" y="152" fill="#aaa" font-family="SF Mono, monospace" font-size="11">NFCorpus 0.42</text>
  </g>

  <!-- throughput -->
  <g transform="translate(520,400)" font-family="SF Mono, monospace">
    <text x="0" y="0" fill="#5a8a6a" font-size="12">THROUGHPUT (texts/s)</text>
    <text x="0" y="40" fill="#e8eef4" font-size="14">short@bs32</text>
    <text x="160" y="40" fill="#76b900" font-size="22" font-weight="700">103</text>
    <text x="0" y="80" fill="#e8eef4" font-size="14">medium@bs32</text>
    <text x="160" y="80" fill="#00d4aa" font-size="22" font-weight="700">28</text>
    <text x="0" y="120" fill="#e8eef4" font-size="14">long@bs16</text>
    <text x="160" y="120" fill="#ff9500" font-size="22" font-weight="700">4.0</text>
  </g>

  <!-- bottom bar -->
  <rect x="0" y="572" width="1200" height="52" fill="#0a1018"/>
  <g font-family="SF Mono, monospace" fill="#8aa" font-size="12">
    <text x="56" y="604">OpenMDW-1.1</text>
    <text x="220" y="604">vLLM 0.24.0</text>
    <text x="380" y="604">max_len 8192</text>
    <text x="560" y="604">util 0.45</text>
    <text x="700" y="604">recipe SMF-Spark-vLLM-0.24-nemotron3-embed-8b-bf16</text>
    <text x="1120" y="604" fill="#76b900">SMF</text>
  </g>
</svg>

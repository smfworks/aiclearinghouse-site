<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Model routing for agent systems: a deterministic request flows through policy, risk class, and capacity checks to local or cloud inference">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f18"/>
      <stop offset="50%" stop-color="#0d1523"/>
      <stop offset="100%" stop-color="#0a0f18"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b00"/>
      <stop offset="100%" stop-color="#ff8f33"/>
    </linearGradient>
    <linearGradient id="local" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- faint mesh grid -->
  <g stroke="#162236" stroke-width="1" opacity="0.35">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="470" x2="1200" y2="470"/>
    <line x1="250" y1="0" x2="250" y2="630"/>
    <line x1="950" y1="0" x2="950" y2="630"/>
  </g>

  <!-- incoming request -->
  <g transform="translate(70, 270)" opacity="0.96">
    <rect x="0" y="0" width="180" height="90" rx="10" fill="#0d1421" stroke="#26354a" stroke-width="2"/>
    <circle cx="20" cy="45" r="7" fill="#ff6b00" filter="url(#glow)"/>
    <text x="42" y="40" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#f0f4fa">Agent Request</text>
    <text x="42" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#7d90aa">goal · context · risk</text>
  </g>

  <!-- arrow into policy -->
  <g transform="translate(260, 308)" opacity="0.8">
    <path d="M0,10 L60,10" fill="none" stroke="#4b5c73" stroke-width="2"/>
    <path d="M54,4 L64,10 L54,16" fill="#4b5c73"/>
  </g>

  <!-- policy box -->
  <g transform="translate(330, 210)" opacity="0.96">
    <rect x="0" y="0" width="220" height="210" rx="14" fill="#0d1421" stroke="#26354a" stroke-width="2"/>
    <text x="110" y="28" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#f0f4fa">Routing Policy</text>
    <text x="110" y="58" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#00d4ff">1. risk class check</text>
    <text x="110" y="85" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9fb0c7">2. capacity check</text>
    <text x="110" y="112" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9fb0c7">3. latency budget</text>
    <text x="110" y="139" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9fb0c7">4. cost ceiling</text>

    <path d="M40,165 L110,195 L180,165" fill="none" stroke="#4b5c73" stroke-width="2"/>
    <text x="110" y="215" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#ff6b00">deterministic fallback</text>
  </g>

  <!-- arrows out to backends -->
  <g transform="translate(555, 308)" opacity="0.8">
    <path d="M0,10 L50,10 L50,-55 L80,-55" fill="none" stroke="#4b5c73" stroke-width="2"/>
    <path d="M74,-61 L84,-55 L74,-49" fill="#4b5c73"/>
    <path d="M0,10 L50,10 L50,75 L80,75" fill="none" stroke="#4b5c73" stroke-width="2"/>
    <path d="M74,69 L84,75 L74,81" fill="#4b5c73"/>
  </g>

  <!-- local backend -->
  <g transform="translate(640, 150)" opacity="0.95">
    <rect x="0" y="0" width="260" height="140" rx="12" fill="#0d1421" stroke="#0891b2" stroke-width="2"/>
    <text x="130" y="28" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#00d4ff">Local Ollama</text>
    <text x="130" y="60" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#9fb0c7">qwen3.6 · llama3.3 · gemma4</text>
    <text x="130" y="85" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#7d90aa">low cost · bounded latency</text>
    <text x="130" y="110" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#00d4ff">default for READ / DRAFT</text>
  </g>

  <!-- cloud backend -->
  <g transform="translate(640, 340)" opacity="0.95">
    <rect x="0" y="0" width="260" height="140" rx="12" fill="#0d1421" stroke="#7c3aed" stroke-width="2"/>
    <text x="130" y="28" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#a78bfa">Cloud Frontier</text>
    <text x="130" y="60" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#9fb0c7">deepseek / claude / gpt</text>
    <text x="130" y="85" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#7d90aa">high capability · metered</text>
    <text x="130" y="110" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#a78bfa">fallback for SEND / complex</text>
  </g>

  <!-- bottom title -->
  <text x="600" y="540" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="700" fill="#f0f4fa">Model Routing for Agent Systems</text>
  <text x="600" y="580" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#7d90aa">A deterministic fallback policy that doesn't panic</text>

  <text x="600" y="610" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#4b5c73">SMF Clearinghouse · Liam's Landing</text>
</svg>

    <text x="250" y="60" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">NVIDIA FP4 — 16-element blocks</text>
    
    <!-- Block visualization: 16 small squares -->
    <g transform="translate(30, 90)">
      <rect x="0" y="0" width="26" height="26" rx="3" fill="url(#nvfp4)" opacity="0.9"/>
      <rect x="30" y="0" width="26" height="26" rx="3" fill="url(#nvfp4)" opacity="0.82"/>
      <rect x="60" y="0" width="26" height="26" rx="3" fill="url(#nvfp4)" opacity="0.74"/>
      <rect x="90" y="0" width="26" height="26" rx="3" fill="url(#nvfp4)" opacity="0.66"/>
      <rect x="120" y="0" width="26" height="26" rx="3" fill="url(#nvfp4)" opacity="0.58"/>

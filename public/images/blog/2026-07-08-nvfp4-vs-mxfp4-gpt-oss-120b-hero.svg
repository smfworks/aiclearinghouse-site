      <rect x="180" y="0" width="26" height="26" rx="3" fill="url(#nvfp4)" opacity="0.42"/>
      <rect x="210" y="0" width="26" height="26" rx="3" fill="url(#nvfp4)" opacity="0.34"/>
      <rect x="240" y="0" width="26" height="26" rx="3" fill="url(#nvfp4)" opacity="0.26"/>
      <rect x="270" y="0" width="26" height="26" rx="3" fill="url(#nvfp4)" opacity="0.18"/>
      <rect x="300" y="0" width="26" height="26" rx="3" fill="url(#nvfp4)" opacity="0.26"/>
      <rect x="330" y="0" width="26" height="26" rx="3" fill="url(#nvfp4)" opacity="0.34"/>
      <rect x="360" y="0" width="26" height="26" rx="3" fill="url(#nvfp4)" opacity="0.42"/>
      <rect x="390" y="0" width="26" height="26" rx="3" fill="url(#nvfp4)" opacity="0.5"/>
      <rect x="420" y="0" width="26" height="26" rx="3" fill="url(#nvfp4)" opacity="0.58"/>
      <rect x="450" y="0" width="26" height="26" rx="3" fill="url(#nvfp4)" opacity="0.66"/>
    </g>
    
    <!-- Shared scale indicator -->
    <rect x="30" y="160" width="476" height="24" rx="4" fill="#064e3b" stroke="#10b981" stroke-width="1" stroke-dasharray="4 2"/>
    <text x="268" y="177" text-anchor="middle" font-family="monospace" font-size="13" fill="#34d399">E8M0 scale (16 elements)</text>
    
    <!-- Specs -->
    <text x="30" y="210" font-family="monospace" font-size="14" fill="#6ee7b7">Block size: 16 elements</text>
    <text x="30" y="234" font-family="monospace" font-size="14" fill="#6ee7b7">Exponent: E8M0 scale</text>
    <text x="30" y="258" font-family="monospace" font-size="14" fill="#6ee7b7">Mantissa: E2M1 per element</text>
    <text x="30" y="282" font-family="monospace" font-size="14" fill="#6ee7b7">Used by: NVIDIA models</text>
    <text x="30" y="306" font-family="monospace" font-size="14" fill="#10b981">Hardware: native tensor core</text>
    <text x="30" y="330" font-family="monospace" font-size="14" fill="#10b981">on Blackwell GB10 ✅</text>
  </g>
  
  <!-- Center arrow -->
  <g transform="translate(600, 295)">
    <text text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#64748b">cast</text>
    <path d="M -20 10 L 20 10 M 10 2 L 20 10 L 10 18" stroke="#64748b" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Bottom bar -->
  <rect x="0" y="490" width="1200" height="140" fill="#0d1117"/>
  <text x="600" y="530" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#64748b">GPT-OSS-120B · 117B params / 5.1B active · 65.2 GB → ~65 GB · DGX Spark GB10</text>
  <text x="600" y="558" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#475569">SMF Works — Optimizing the Un-Optimizable · Day 1</text>
  <text x="600" y="600" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155">NVIDIA Model Optimizer 0.45 · --cast_mxfp4_to_nvfp4</text>
</svg>
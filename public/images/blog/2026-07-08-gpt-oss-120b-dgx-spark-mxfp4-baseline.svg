  <text x="60" y="100" font-family="monospace" font-size="16" fill="#7a8bb5">MXFP4 Baseline on DGX Spark · 117B params · 5.1B active · 59.7% smf-bench</text>
  
  <!-- Left panel: Model architecture visualization -->
  <g transform="translate(60, 140)">

  <!-- Bottom info bar -->
  <g transform="translate(60, 540)">
    <rect x="0" y="0" width="1080" height="40" rx="6" fill="#111634" stroke="#2a3458" stroke-width="1"/>
    <text x="20" y="25" font-family="monospace" font-size="12" fill="#7a8bb5">65.25 GB MXFP4</text>
    <text x="170" y="25" font-family="monospace" font-size="12" fill="#7a8bb5">|</text>
    <text x="185" y="25" font-family="monospace" font-size="12" fill="#7a8bb5">121 GB Unified Memory</text>
    <text x="370" y="25" font-family="monospace" font-size="12" fill="#7a8bb5">|</text>
    <text x="385" y="25" font-family="monospace" font-size="12" fill="#7a8bb5">32.2 tok/s</text>
    <text x="490" y="25" font-family="monospace" font-size="12" fill="#7a8bb5">|</text>
    <text x="505" y="25" font-family="monospace" font-size="12" fill="#7a8bb5">0 errors</text>
    <text x="590" y="25" font-family="monospace" font-size="12" fill="#7a8bb5">|</text>
    <text x="605" y="25" font-family="monospace" font-size="12" fill="#7a8bb5">vLLM v0.24.0</text>
    <text x="730" y="25" font-family="monospace" font-size="12" fill="#7a8bb5">|</text>
    <text x="745" y="25" font-family="monospace" font-size="12" fill="#7a8bb5">GB10 Grace Blackwell</text>
    <text x="920" y="25" font-family="monospace" font-size="12" fill="#7a8bb5">|</text>
    <text x="935" y="25" font-family="monospace" font-size="12" fill="#7a8bb5">Apache 2.0</text>

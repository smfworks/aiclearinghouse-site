      <rect x="42" y="0" width="35" height="35" rx="4" fill="#1a2342" stroke="#2a3458" stroke-width="1"/>
      <rect x="84" y="0" width="35" height="35" rx="4" fill="#1a2342" stroke="#2a3458" stroke-width="1"/>
      <rect x="126" y="0" width="35" height="35" rx="4" fill="url(#moe)" stroke="#10b981" stroke-width="1.5"/>
      <rect x="168" y="0" width="35" height="35" rx="4" fill="#1a2342" stroke="#2a3458" stroke-width="1"/>
      <rect x="210" y="0" width="35" height="35" rx="4" fill="#1a2342" stroke="#2a3458" stroke-width="1"/>
      <rect x="252" y="0" width="35" height="35" rx="4" fill="#1a2342" stroke="#2a3458" stroke-width="1"/>

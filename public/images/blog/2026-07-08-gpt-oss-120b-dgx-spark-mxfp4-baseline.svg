      <rect x="378" y="0" width="35" height="35" rx="4" fill="#1a2342" stroke="#2a3458" stroke-width="1"/>
      <rect x="420" y="0" width="35" height="35" rx="4" fill="#1a2342" stroke="#2a3458" stroke-width="1"/>
      <rect x="462" y="0" width="35" height="35" rx="4" fill="url(#moe)" stroke="#10b981" stroke-width="1.5"/>
      
      <!-- Row 2 -->
      <rect x="0" y="42" width="35" height="35" rx="4" fill="#1a2342" stroke="#2a3458" stroke-width="1"/>
      <rect x="42" y="42" width="35" height="35" rx="4" fill="#1a2342" stroke="#2a3458" stroke-width="1"/>
      <rect x="84" y="42" width="35" height="35" rx="4" fill="#1a2342" stroke="#2a3458" stroke-width="1"/>
      <rect x="126" y="42" width="35" height="35" rx="4" fill="#1a2342" stroke="#2a3458" stroke-width="1"/>
      <rect x="168" y="42" width="35" height="35" rx="4" fill="#1a2342" stroke="#2a3458" stroke-width="1"/>
      <rect x="210" y="42" width="35" height="35" rx="4" fill="#1a2342" stroke="#2a3458" stroke-width="1"/>
      <rect x="252" y="42" width="35" height="35" rx="4" fill="#1a2342" stroke="#2a3458" stroke-width="1"/>
      <rect x="294" y="42" width="35" height="35" rx="4" fill="#1a2342" stroke="#2a3458" stroke-width="1"/>
      <rect x="336" y="42" width="35" height="35" rx="4" fill="#1a2342" stroke="#2a3458" stroke-width="1"/>
      <rect x="378" y="42" width="35" height="35" rx="4" fill="#1a2342" stroke="#2a3458" stroke-width="1"/>
      <rect x="420" y="42" width="35" height="35" rx="4" fill="#1a2342" stroke="#2a3458" stroke-width="1"/>
      <rect x="462" y="42" width="35" height="35" rx="4" fill="#1a2342" stroke="#2a3458" stroke-width="1"/>
      
      <!-- Row 3-8 compressed as rows -->
      <rect x="0" y="84" width="35" height="35" rx="4" fill="#161b35" stroke="#2a3458" stroke-width="0.5"/>
      <rect x="42" y="84" width="35" height="35" rx="4" fill="#161b35" stroke="#2a3458" stroke-width="0.5"/>
      <rect x="84" y="84" width="35" height="35" rx="4" fill="#161b35" stroke="#2a3458" stroke-width="0.5"/>
      <rect x="126" y="84" width="35" height="35" rx="4" fill="#161b35" stroke="#2a3458" stroke-width="0.5"/>
      <rect x="168" y="84" width="35" height="35" rx="4" fill="#161b35" stroke="#2a3458" stroke-width="0.5"/>
      <rect x="210" y="84" width="35" height="35" rx="4" fill="#161b35" stroke="#2a3458" stroke-width="0.5"/>
      <rect x="252" y="84" width="35" height="35" rx="4" fill="#161b35" stroke="#2a3458" stroke-width="0.5"/>

      <rect x="120" y="74" width="400" height="18" rx="3" fill="#1a2342"/>
      <rect x="120" y="74" width="333" height="18" rx="3" fill="url(#bar)"/>
      <text x="530" y="86" font-family="monospace" font-size="11" fill="#00d9a3">83.3%</text>
      
      <!-- instruction 76.7% -->
      <text x="0" y="110" font-family="monospace" font-size="11" fill="#c0cce0">instruction</text>
      <rect x="120" y="98" width="400" height="18" rx="3" fill="#1a2342"/>
      <rect x="120" y="98" width="307" height="18" rx="3" fill="url(#bar)"/>
      <text x="530" y="110" font-family="monospace" font-size="11" fill="#00d9a3">76.7%</text>
      
      <!-- reasoning_t0 70.0% -->
      <text x="0" y="134" font-family="monospace" font-size="11" fill="#c0cce0">reasoning_t0</text>
      <rect x="120" y="122" width="400" height="18" rx="3" fill="#1a2342"/>
      <rect x="120" y="122" width="280" height="18" rx="3" fill="url(#bar)"/>
      <text x="530" y="134" font-family="monospace" font-size="11" fill="#e8c547">70.0%</text>
      
      <!-- math 26.7% -->
      <text x="0" y="158" font-family="monospace" font-size="11" fill="#c0cce0">math</text>
      <rect x="120" y="146" width="400" height="18" rx="3" fill="#1a2342"/>
      <rect x="120" y="146" width="107" height="18" rx="3" fill="#e8c547" opacity="0.7"/>
      <text x="530" y="158" font-family="monospace" font-size="11" fill="#e8c547">26.7%</text>
      
      <!-- coding 10.0% -->
      <text x="0" y="182" font-family="monospace" font-size="11" fill="#c0cce0">coding</text>
      <rect x="120" y="170" width="400" height="18" rx="3" fill="#1a2342"/>
      <rect x="120" y="170" width="40" height="18" rx="3" fill="#e74c3c" opacity="0.7"/>
      <text x="530" y="182" font-family="monospace" font-size="11" fill="#e74c3c">10.0%</text>
      
      <!-- tool_calling 0% -->
      <text x="0" y="206" font-family="monospace" font-size="11" fill="#c0cce0">tool_calling</text>
      <rect x="120" y="194" width="400" height="18" rx="3" fill="#1a2342"/>
      <text x="530" y="206" font-family="monospace" font-size="11" fill="#e74c3c">0.0%</text>
      
      <!-- Overall line -->
      <line x1="0" y1="230" x2="520" y2="230" stroke="#2a3458" stroke-width="0.5"/>
      <text x="0" y="252" font-family="monospace" font-size="13" fill="#e0e7ff" font-weight="bold">OVERALL</text>
      <rect x="120" y="240" width="400" height="18" rx="3" fill="#1a2342"/>
      <rect x="120" y="240" width="239" height="18" rx="3" fill="url(#accent)"/>
      <text x="530" y="252" font-family="monospace" font-size="13" fill="#00d9a3" font-weight="bold">59.7%</text>

      <rect x="120" y="50" width="400" height="18" rx="3" fill="#1a2342"/>
      <rect x="120" y="50" width="375" height="18" rx="3" fill="url(#bar)"/>
      <text x="530" y="62" font-family="monospace" font-size="11" fill="#00d9a3" font-weight="bold">93.8%</text>
      
      <!-- prose 83.3% -->

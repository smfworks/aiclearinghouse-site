<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="624" viewBox="0 0 1200 624">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#12121a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="624" fill="url(#bg)"/>

  <!-- Two domain nodes: Medical + Education -->
  <g font-family="monospace" fill="#C9A96E">
    <rect x="140" y="220" width="280" height="120" rx="10" fill="none" stroke="#ea580c" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="280" y="270" text-anchor="middle" font-size="18" fill-opacity="0.85">SMF SWARM MO</text>
    <text x="280" y="300" text-anchor="middle" font-size="13" fill-opacity="0.45">Medical Office · HIPAA</text>
    <text x="280" y="320" text-anchor="middle" font-size="12" fill-opacity="0.35">local LLM enforced</text>

    <rect x="780" y="220" width="280" height="120" rx="10" fill="none" stroke="#C9A96E" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="920" y="270" text-anchor="middle" font-size="18" fill-opacity="0.85">SMF SWARM ED</text>
    <text x="920" y="300" text-anchor="middle" font-size="13" fill-opacity="0.45">Education · FERPA</text>
    <text x="920" y="320" text-anchor="middle" font-size="12" fill-opacity="0.35">local LLM enforced</text>


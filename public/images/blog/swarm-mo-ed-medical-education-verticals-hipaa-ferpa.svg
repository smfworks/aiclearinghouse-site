  <line x1="0" y1="0" x2="60" y2="0" stroke="#C9A96E" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="0" y1="0" x2="0" y2="60" stroke="#C9A96E" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="1140" y1="624" x2="1200" y2="624" stroke="#ea580c" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="1200" y1="564" x2="1200" y2="624" stroke="#ea580c" stroke-width="2" stroke-opacity="0.3"/>

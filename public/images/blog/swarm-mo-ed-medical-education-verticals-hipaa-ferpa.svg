    <text x="600" y="298" text-anchor="middle" font-size="11" fill-opacity="0.35">governance · multi-persona</text>

    <!-- Connectors -->
    <line x1="420" y1="280" x2="480" y2="280" stroke="#ea580c" stroke-opacity="0.3" stroke-width="1.5"/>
    <line x1="720" y1="280" x2="780" y2="280" stroke="#C9A96E" stroke-opacity="0.3" stroke-width="1.5"/>
  </g>

  <!-- Bottom labels -->
  <text x="600" y="420" text-anchor="middle" font-family="monospace" font-size="12" fill="#C9A96E" fill-opacity="0.35">FEDERAL FLOOR: HIPAA  ·  FERPA  ·  COPPA</text>
  <text x="600" y="450" text-anchor="middle" font-family="monospace" font-size="11" fill="#ea580c" fill-opacity="0.25">DRAFT — PROFESSIONAL REVIEW REQUIRED</text>


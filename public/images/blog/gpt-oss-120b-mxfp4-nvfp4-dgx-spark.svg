<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06141e;stop-opacity:1" />
    </linearGradient>

    <!-- GPU chip gradient -->
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#76b900;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#4a7a00;stop-opacity:0.7" />
    </linearGradient>

    <!-- NVFP4 block gradient -->
    <linearGradient id="nvfp4Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#007a66;stop-opacity:0.5" />
    </linearGradient>

    <!-- MXFP4 block gradient -->
    <linearGradient id="mxfp4Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9500;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#cc6600;stop-opacity:0.5" />
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2a3a" stroke-width="0.5" opacity="0.3"/>
    </pattern>

    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4aa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="700" fill="#e8eef4" letter-spacing="2">
    GPT-OSS-120B: MXFP4 → NVFP4 on DGX Spark
  </text>
  <text x="600" y="82" text-anchor="middle" font-family="'SF Mono', 'Courier New', monospace"
        font-size="14" fill="#5a8a6a" letter-spacing="1">
    117B params · 5.1B active · 128 experts · GB10 Grace Blackwell
  </text>

  <!-- Left side: MXFP4 representation -->
  <g transform="translate(80, 130)">
    <text x="160" y="20" text-anchor="middle" font-family="'SF Mono', monospace" font-size="16" fill="#ff9500" font-weight="600">
      MXFP4
    </text>
    <text x="160" y="40" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#886644">
      block_size=32 · E8M0 scales
    </text>

    <!-- MXFP4 blocks: 8 blocks of 32 elements -->
    <g transform="translate(0, 55)">
      <rect x="0" y="0" width="38" height="80" rx="3" fill="url(#mxfp4Grad)" stroke="#ff9500" stroke-width="1.5" opacity="0.7"/>
      <rect x="42" y="0" width="38" height="80" rx="3" fill="url(#mxfp4Grad)" stroke="#ff9500" stroke-width="1.5" opacity="0.7"/>
      <rect x="84" y="0" width="38" height="80" rx="3" fill="url(#mxfp4Grad)" stroke="#ff9500" stroke-width="1.5" opacity="0.7"/>
      <rect x="126" y="0" width="38" height="80" rx="3" fill="url(#mxfp4Grad)" stroke="#ff9500" stroke-width="1.5" opacity="0.7"/>
      <rect x="168" y="0" width="38" height="80" rx="3" fill="url(#mxfp4Grad)" stroke="#ff9500" stroke-width="1.5" opacity="0.7"/>
      <rect x="210" y="0" width="38" height="80" rx="3" fill="url(#mxfp4Grad)" stroke="#ff9500" stroke-width="1.5" opacity="0.7"/>
      <rect x="252" y="0" width="38" height="80" rx="3" fill="url(#mxfp4Grad)" stroke="#ff9500" stroke-width="1.5" opacity="0.7"/>
      <rect x="294" y="0" width="38" height="80" rx="3" fill="url(#mxfp4Grad)" stroke="#ff9500" stroke-width="1.5" opacity="0.7"/>
    </g>

    <!-- Scale indicators -->
    <g transform="translate(0, 145)" font-family="'SF Mono', monospace" font-size="9" fill="#886644">
      <text x="19" y="12" text-anchor="middle">2^a</text>
      <text x="61" y="12" text-anchor="middle">2^b</text>
      <text x="103" y="12" text-anchor="middle">2^c</text>
      <text x="145" y="12" text-anchor="middle">2^d</text>
      <text x="187" y="12" text-anchor="middle">2^e</text>
      <text x="229" y="12" text-anchor="middle">2^f</text>
      <text x="271" y="12" text-anchor="middle">2^g</text>
      <text x="313" y="12" text-anchor="middle">2^h</text>
    </g>

    <text x="160" y="180" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#666">
      E8M0: powers of 2 only
    </text>
  </g>

  <!-- Arrow: MXFP4 → NVFP4 -->
  <g transform="translate(420, 175)">
    <text x="30" y="-15" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#00d4aa" font-weight="600">
      Model Optimizer
    </text>
    <text x="30" y="-3" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#00d4aa">
      0.45.0
    </text>
    <line x1="0" y1="15" x2="60" y2="15" stroke="#00d4aa" stroke-width="2.5" marker-end="url(#arrowhead)" filter="url(#glow)"/>
    <text x="30" y="35" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#445">
      dequant → requant
    </text>
  </g>

  <!-- Right side: NVFP4 representation -->
  <g transform="translate(540, 130)">
    <text x="280" y="20" text-anchor="middle" font-family="'SF Mono', monospace" font-size="16" fill="#00d4aa" font-weight="600">
      NVFP4
    </text>
    <text x="280" y="40" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#448877">
      block_size=16 · E4M3 scales · native GB10
    </text>

    <!-- NVFP4 blocks: 16 blocks of 16 elements (same total, finer granularity) -->
    <g transform="translate(0, 55)">
      <rect x="0" y="0" width="18" height="80" rx="2" fill="url(#nvfp4Grad)" stroke="#00d4aa" stroke-width="1" opacity="0.8"/>
      <rect x="20" y="0" width="18" height="80" rx="2" fill="url(#nvfp4Grad)" stroke="#00d4aa" stroke-width="1" opacity="0.8"/>
      <rect x="40" y="0" width="18" height="80" rx="2" fill="url(#nvfp4Grad)" stroke="#00d4aa" stroke-width="1" opacity="0.8"/>
      <rect x="60" y="0" width="18" height="80" rx="2" fill="url(#nvfp4Grad)" stroke="#00d4aa" stroke-width="1" opacity="0.8"/>
      <rect x="80" y="0" width="18" height="80" rx="2" fill="url(#nvfp4Grad)" stroke="#00d4aa" stroke-width="1" opacity="0.8"/>
      <rect x="100" y="0" width="18" height="80" rx="2" fill="url(#nvfp4Grad)" stroke="#00d4aa" stroke-width="1" opacity="0.8"/>
      <rect x="120" y="0" width="18" height="80" rx="2" fill="url(#nvfp4Grad)" stroke="#00d4aa" stroke-width="1" opacity="0.8"/>
      <rect x="140" y="0" width="18" height="80" rx="2" fill="url(#nvfp4Grad)" stroke="#00d4aa" stroke-width="1" opacity="0.8"/>
      <rect x="160" y="0" width="18" height="80" rx="2" fill="url(#nvfp4Grad)" stroke="#00d4aa" stroke-width="1" opacity="0.8"/>
      <rect x="180" y="0" width="18" height="80" rx="2" fill="url(#nvfp4Grad)" stroke="#00d4aa" stroke-width="1" opacity="0.8"/>
      <rect x="200" y="0" width="18" height="80" rx="2" fill="url(#nvfp4Grad)" stroke="#00d4aa" stroke-width="1" opacity="0.8"/>
      <rect x="220" y="0" width="18" height="80" rx="2" fill="url(#nvfp4Grad)" stroke="#00d4aa" stroke-width="1" opacity="0.8"/>
      <rect x="240" y="0" width="18" height="80" rx="2" fill="url(#nvfp4Grad)" stroke="#00d4aa" stroke-width="1" opacity="0.8"/>
      <rect x="260" y="0" width="18" height="80" rx="2" fill="url(#nvfp4Grad)" stroke="#00d4aa" stroke-width="1" opacity="0.8"/>
      <rect x="280" y="0" width="18" height="80" rx="2" fill="url(#nvfp4Grad)" stroke="#00d4aa" stroke-width="1" opacity="0.8"/>
      <rect x="300" y="0" width="18" height="80" rx="2" fill="url(#nvfp4Grad)" stroke="#00d4aa" stroke-width="1" opacity="0.8"/>
    </g>

    <!-- Scale indicators -->
    <g transform="translate(0, 145)" font-family="'SF Mono', monospace" font-size="8" fill="#448877">
      <text x="9" y="12" text-anchor="middle">1.0</text>
      <text x="29" y="12" text-anchor="middle">1.1</text>
      <text x="49" y="12" text-anchor="middle">0.9</text>
      <text x="69" y="12" text-anchor="middle">1.2</text>
      <text x="89" y="12" text-anchor="middle">1.0</text>
      <text x="109" y="12" text-anchor="middle">0.8</text>
      <text x="129" y="12" text-anchor="middle">1.3</text>
      <text x="149" y="12" text-anchor="middle">1.1</text>
      <text x="169" y="12" text-anchor="middle">1.0</text>
      <text x="189" y="12" text-anchor="middle">0.9</text>
      <text x="209" y="12" text-anchor="middle">1.2</text>
      <text x="229" y="12" text-anchor="middle">1.0</text>
      <text x="249" y="12" text-anchor="middle">1.1</text>
      <text x="269" y="12" text-anchor="middle">0.9</text>
      <text x="289" y="12" text-anchor="middle">1.1</text>
      <text x="309" y="12" text-anchor="middle">1.0</text>
    </g>

    <text x="160" y="180" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#446">
      E4M3: fractional scales (8 mantissa levels)
    </text>
  </g>

  <!-- DGX Spark chip representation -->
  <g transform="translate(400, 370)">
    <!-- Chip body -->
    <rect x="0" y="0" width="400" height="120" rx="12" fill="#0d1b2a" stroke="#76b900" stroke-width="2" opacity="0.9"/>
    <rect x="10" y="10" width="380" height="100" rx="8" fill="url(#chipGrad)" opacity="0.15"/>

    <!-- Chip pins (top) -->
    <g fill="#3a5a00">
      <rect x="30" y="-8" width="4" height="8"/>
      <rect x="50" y="-8" width="4" height="8"/>
      <rect x="70" y="-8" width="4" height="8"/>
      <rect x="90" y="-8" width="4" height="8"/>
      <rect x="110" y="-8" width="4" height="8"/>
      <rect x="130" y="-8" width="4" height="8"/>
      <rect x="150" y="-8" width="4" height="8"/>
      <rect x="170" y="-8" width="4" height="8"/>
      <rect x="190" y="-8" width="4" height="8"/>
      <rect x="210" y="-8" width="4" height="8"/>
      <rect x="230" y="-8" width="4" height="8"/>
      <rect x="250" y="-8" width="4" height="8"/>
      <rect x="270" y="-8" width="4" height="8"/>
      <rect x="290" y="-8" width="4" height="8"/>
      <rect x="310" y="-8" width="4" height="8"/>
      <rect x="330" y="-8" width="4" height="8"/>
      <rect x="350" y="-8" width="4" height="8"/>
      <rect x="370" y="-8" width="4" height="8"/>
    </g>

    <!-- Chip pins (bottom) -->
    <g fill="#3a5a00">
      <rect x="30" y="120" width="4" height="8"/>
      <rect x="50" y="120" width="4" height="8"/>
      <rect x="70" y="120" width="4" height="8"/>
      <rect x="90" y="120" width="4" height="8"/>
      <rect x="110" y="120" width="4" height="8"/>
      <rect x="130" y="120" width="4" height="8"/>
      <rect x="150" y="120" width="4" height="8"/>
      <rect x="170" y="120" width="4" height="8"/>
      <rect x="190" y="120" width="4" height="8"/>
      <rect x="210" y="120" width="4" height="8"/>
      <rect x="230" y="120" width="4" height="8"/>
      <rect x="250" y="120" width="4" height="8"/>
      <rect x="270" y="120" width="4" height="8"/>
      <rect x="290" y="120" width="4" height="8"/>
      <rect x="310" y="120" width="4" height="8"/>
      <rect x="330" y="120" width="4" height="8"/>
      <rect x="350" y="120" width="4" height="8"/>
      <rect x="370" y="120" width="4" height="8"/>
    </g>

    <!-- Chip label -->
    <text x="200" y="45" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="22" font-weight="700" fill="#76b900" filter="url(#glow)">
      GB10 Grace Blackwell
    </text>
    <text x="200" y="70" text-anchor="middle" font-family="'SF Mono', monospace" font-size="12" fill="#5a8a6a">
      SuperChip · 121 GB unified memory
    </text>
    <text x="200" y="90" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#446">
      Native NVFP4 tensor cores · ARM64
    </text>
  </g>

  <!-- Benchmark stats bar at bottom -->
  <g transform="translate(60, 540)">
    <rect x="0" y="0" width="1080" height="70" rx="8" fill="#0a1520" stroke="#1a3a2a" stroke-width="1" opacity="0.9"/>

    <!-- Model size -->
    <g transform="translate(20, 15)">
      <text x="0" y="12" font-family="'SF Mono', monospace" font-size="10" fill="#5a8a6a">MODEL SIZE</text>
      <text x="0" y="35" font-family="'SF Pro Display', sans-serif" font-size="22" font-weight="700" fill="#e8eef4">57 GB</text>
      <text x="0" y="52" font-family="'SF Mono', monospace" font-size="9" fill="#666">MXFP4 · 14 shards</text>
    </g>

    <!-- Parameters -->
    <g transform="translate(200, 15)">
      <text x="0" y="12" font-family="'SF Mono', monospace" font-size="10" fill="#5a8a6a">PARAMETERS</text>
      <text x="0" y="35" font-family="'SF Pro Display', sans-serif" font-size="22" font-weight="700" fill="#e8eef4">117B</text>
      <text x="0" y="52" font-family="'SF Mono', monospace" font-size="9" fill="#666">5.1B active per token</text>
    </g>

    <!-- Experts -->
    <g transform="translate(380, 15)">
      <text x="0" y="12" font-family="'SF Mono', monospace" font-size="10" fill="#5a8a6a">EXPERTS</text>
      <text x="0" y="35" font-family="'SF Pro Display', sans-serif" font-size="22" font-weight="700" fill="#e8eef4">128</text>
      <text x="0" y="52" font-family="'SF Mono', monospace" font-size="9" fill="#666">top-4 routing</text>
    </g>

    <!-- Context -->
    <g transform="translate(530, 15)">
      <text x="0" y="12" font-family="'SF Mono', monospace" font-size="10" fill="#5a8a6a">CONTEXT</text>
      <text x="0" y="35" font-family="'SF Pro Display', sans-serif" font-size="22" font-weight="700" fill="#e8eef4">131K</text>
      <text x="0" y="52" font-family="'SF Mono', monospace" font-size="9" fill="#666">YaRN RoPE scaling</text>
    </g>

    <!-- Benchmark -->
    <g transform="translate(680, 15)">
      <text x="0" y="12" font-family="'SF Mono', monospace" font-size="10" fill="#5a8a6a">BENCHMARK</text>
      <text x="0" y="35" font-family="'SF Pro Display', sans-serif" font-size="22" font-weight="700" fill="#e8eef4">181</text>
      <text x="0" y="52" font-family="'SF Mono', monospace" font-size="9" fill="#666">smf-bench tests</text>
    </g>

    <!-- License -->
    <g transform="translate(830, 15)">
      <text x="0" y="12" font-family="'SF Mono', monospace" font-size="10" fill="#5a8a6a">LICENSE</text>
      <text x="0" y="35" font-family="'SF Pro Display', sans-serif" font-size="22" font-weight="700" fill="#e8eef4">Apache 2.0</text>
      <text x="0" y="52" font-family="'SF Mono', monospace" font-size="9" fill="#666">OpenAI · 4.3M downloads</text>
    </g>

    <!-- Series badge -->
    <g transform="translate(970, 15)">
      <rect x="0" y="5" width="90" height="40" rx="6" fill="#76b900" opacity="0.15" stroke="#76b900" stroke-width="1"/>
      <text x="45" y="22" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#76b900" font-weight="600">DEEP DIVE</text>
      <text x="45" y="36" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#5a8a6a">#1 / 10</text>
    </g>
  </g>
</svg>
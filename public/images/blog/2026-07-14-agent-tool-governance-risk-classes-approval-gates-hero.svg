<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="55%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#141d33"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- grid lines -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Four risk-class lanes -->
  <!-- READ -->
  <rect x="40" y="120" width="280" height="100" rx="8" fill="url(#green)" stroke="#22c55e" stroke-width="1.5" opacity="0.9"/>
  <text x="180" y="150" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="700" fill="#22c55e">READ</text>
  <text x="180" y="175" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#86efac">Autonomous</text>
  <text x="180" y="198" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#4ade80">read_file · list_dir · fetch_url</text>

  <!-- DRAFT -->
  <rect x="360" y="120" width="280" height="100" rx="8" fill="url(#blue)" stroke="#3b82f6" stroke-width="1.5" opacity="0.9"/>
  <text x="500" y="150" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="700" fill="#3b82f6">DRAFT</text>
  <text x="500" y="175" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#93c5fd">Autonomous</text>
  <text x="500" y="198" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#60a5fa">write_file · create_draft</text>

  <!-- SEND -->
  <rect x="680" y="120" width="280" height="100" rx="8" fill="url(#amber)" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
  <text x="820" y="150" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="700" fill="#f59e0b">SEND</text>
  <text x="820" y="175" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#fcd34d">Approval Gate</text>
  <text x="820" y="198" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#fbbf24">send_email · post_message</text>

  <!-- DESTRUCTIVE -->
  <rect x="1000" y="120" width="160" height="100" rx="8" fill="url(#red)" stroke="#ef4444" stroke-width="1.5" opacity="0.9"/>
  <text x="1080" y="150" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700" fill="#ef4444">DESTRUCTIVE</text>
  <text x="1080" y="175" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#fca5a5">Approval Gate</text>
  <text x="1080" y="198" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#f87171">delete_file · rm -rf</text>

  <!-- Flow arrows between lanes -->
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="320" y1="170" x2="355" y2="170"/>
    <line x1="640" y1="170" x2="675" y2="170"/>
    <line x1="960" y1="170" x2="995" y2="170"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="350" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="800" fill="#f1f5f9" filter="url(#glow)">Agent Tool Governance</text>
  <text x="600" y="395" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="500" fill="#94a3b8">Risk Classes · Approval Gates · Autonomous Boundaries</text>

  <!-- Broker / gate symbol -->
  <g transform="translate(500,440)">
    <rect x="0" y="0" width="200" height="70" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="100" y="28" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700" fill="#f59e0b">Governance Broker</text>
    <text x="100" y="50" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#cbd5e1">policy.evaluate(action) → allow | deny | approve</text>
  </g>

  <!-- Bottom annotation -->
  <text x="600" y="560" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#475569">// The boundary between autonomous and gated is the whole game</text>
  <text x="600" y="590" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#334155">Liam's Landing · SMF Clearinghouse · 2026-07-14</text>
</svg>
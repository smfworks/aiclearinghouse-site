<?xml version="1.0" encoding="UTF-8"?>
<!-- Hero for "Thirteen Pull Requests in One Day" — abstract: 13 PR nodes
     merging into a central trunk, violet/cyan/amber palette on dark navy.
     Validates as well-formed XML. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Thirteen pull request nodes merging into a central branch trunk">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#0f1a2e"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="violetGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e7490" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="amberGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid frame -->
  <g stroke="#162236" stroke-width="2">
    <line x1="80" y1="0" x2="80" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="550" x2="1200" y2="550"/>
  </g>

  <!-- Soft horizontal glows behind the trunk -->
  <rect x="0" y="280" width="1200" height="70" fill="url(#violetGlow)" filter="url(#blur)"/>
  <rect x="0" y="220" width="1200" height="50" fill="url(#cyanGlow)" filter="url(#blur)" opacity="0.6"/>
  <rect x="0" y="360" width="1200" height="50" fill="url(#amberGlow)" filter="url(#blur)" opacity="0.6"/>

  <!-- Central trunk line (main branch) -->
  <line x1="100" y1="315" x2="1100" y2="315" stroke="#2d3a5e" stroke-width="5" stroke-linecap="round"/>
  <line x1="100" y1="315" x2="1100" y2="315" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- Trunk endpoint (left) — the fork -->
  <g transform="translate(100, 315)">
    <circle cx="0" cy="0" r="28" fill="#7c3aed" opacity="0.9" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#a78bfa" stroke-width="2.5" opacity="0.8"/>
    <circle cx="0" cy="0" r="9" fill="#0a1628"/>
  </g>

  <!-- Trunk endpoint (right) — upstream main -->
  <g transform="translate(1100, 315)">
    <circle cx="0" cy="0" r="32" fill="#0e7490" opacity="0.9" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="#22d3ee" stroke-width="2.5" opacity="0.8"/>
    <circle cx="0" cy="0" r="11" fill="#0a1628"/>
  </g>

  <!-- 13 PR branch nodes merging into trunk -->
  <!-- Row 1: upper branches (7 nodes) -->
  <!-- PR 1 -->
  <g transform="translate(180, 180)">
    <line x1="0" y1="0" x2="0" y2="135" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="14" fill="#3b82f6" opacity="0.85" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="5" fill="#0a1628"/>
  </g>
  <!-- PR 2 -->
  <g transform="translate(260, 200)">
    <line x1="0" y1="0" x2="0" y2="115" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="16" fill="#a78bfa" opacity="0.85" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="#c4b5fd" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="5" fill="#0a1628"/>
  </g>
  <!-- PR 3 -->
  <g transform="translate(340, 170)">
    <line x1="0" y1="0" x2="0" y2="145" stroke="#34d399" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="13" fill="#34d399" opacity="0.85" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="13" fill="none" stroke="#6ee7b7" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="4" fill="#0a1628"/>
  </g>
  <!-- PR 4 -->
  <g transform="translate(420, 190)">
    <line x1="0" y1="0" x2="0" y2="125" stroke="#22d3ee" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="15" fill="#22d3ee" opacity="0.85" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#67e8f9" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="5" fill="#0a1628"/>
  </g>
  <!-- PR 5 -->
  <g transform="translate(500, 160)">
    <line x1="0" y1="0" x2="0" y2="155" stroke="#fbbf24" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="14" fill="#fbbf24" opacity="0.85" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#fcd34d" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="5" fill="#0a1628"/>
  </g>
  <!-- PR 6 -->
  <g transform="translate(580, 185)">
    <line x1="0" y1="0" x2="0" y2="130" stroke="#fb7185" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="15" fill="#fb7185" opacity="0.85" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#fda4af" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="5" fill="#0a1628"/>
  </g>
  <!-- PR 7 -->
  <g transform="translate(660, 175)">
    <line x1="0" y1="0" x2="0" y2="140" stroke="#0e7490" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="13" fill="#0e7490" opacity="0.85" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="13" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="4" fill="#0a1628"/>
  </g>

  <!-- Row 2: lower branches (6 nodes) -->
  <!-- PR 8 -->
  <g transform="translate(740, 450)">
    <line x1="0" y1="0" x2="0" y2="-135" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="15" fill="#a78bfa" opacity="0.85" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#c4b5fd" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="5" fill="#0a1628"/>
  </g>
  <!-- PR 9 -->
  <g transform="translate(820, 470)">
    <line x1="0" y1="0" x2="0" y2="-155" stroke="#34d399" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="16" fill="#34d399" opacity="0.85" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="#6ee7b7" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="5" fill="#0a1628"/>
  </g>
  <!-- PR 10 -->
  <g transform="translate(890, 455)">
    <line x1="0" y1="0" x2="0" y2="-140" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="14" fill="#3b82f6" opacity="0.85" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="5" fill="#0a1628"/>
  </g>
  <!-- PR 11 -->
  <g transform="translate(960, 475)">
    <line x1="0" y1="0" x2="0" y2="-160" stroke="#22d3ee" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="15" fill="#22d3ee" opacity="0.85" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#67e8f9" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="5" fill="#0a1628"/>
  </g>
  <!-- PR 12 -->
  <g transform="translate(1020, 460)">
    <line x1="0" y1="0" x2="0" y2="-145" stroke="#fbbf24" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="13" fill="#fbbf24" opacity="0.85" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="13" fill="none" stroke="#fcd34d" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="4" fill="#0a1628"/>
  </g>
  <!-- PR 13 -->
  <g transform="translate(1075, 480)">
    <line x1="0" y1="0" x2="0" y2="-165" stroke="#fb7185" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="14" fill="#fb7185" opacity="0.85" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#fda4af" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="5" fill="#0a1628"/>
  </g>

  <!-- Merge points on trunk (small diamonds where branches connect) -->
  <g fill="#a78bfa" opacity="0.6">
    <rect x="176" y="311" width="8" height="8" transform="rotate(45 180 315)"/>
    <rect x="256" y="311" width="8" height="8" transform="rotate(45 260 315)"/>
    <rect x="336" y="311" width="8" height="8" transform="rotate(45 340 315)"/>
    <rect x="416" y="311" width="8" height="8" transform="rotate(45 420 315)"/>
    <rect x="496" y="311" width="8" height="8" transform="rotate(45 500 315)"/>
    <rect x="576" y="311" width="8" height="8" transform="rotate(45 580 315)"/>
    <rect x="656" y="311" width="8" height="8" transform="rotate(45 660 315)"/>
    <rect x="736" y="311" width="8" height="8" transform="rotate(45 740 315)"/>
    <rect x="816" y="311" width="8" height="8" transform="rotate(45 820 315)"/>
    <rect x="886" y="311" width="8" height="8" transform="rotate(45 890 315)"/>
    <rect x="956" y="311" width="8" height="8" transform="rotate(45 960 315)"/>
    <rect x="1016" y="311" width="8" height="8" transform="rotate(45 1020 315)"/>
    <rect x="1071" y="311" width="8" height="8" transform="rotate(45 1075 315)"/>
  </g>

  <!-- Subtle dot grid in background corners -->
  <g fill="#1e293b" opacity="0.4">
    <circle cx="120" cy="120" r="2"/><circle cx="160" cy="120" r="2"/><circle cx="200" cy="120" r="2"/>
    <circle cx="120" cy="160" r="2"/><circle cx="160" cy="160" r="2"/><circle cx="200" cy="160" r="2"/>
    <circle cx="120" cy="520" r="2"/><circle cx="160" cy="520" r="2"/><circle cx="200" cy="520" r="2"/>
    <circle cx="1000" cy="120" r="2"/><circle cx="1040" cy="120" r="2"/><circle cx="1080" cy="120" r="2"/>
    <circle cx="1000" cy="520" r="2"/><circle cx="1040" cy="520" r="2"/><circle cx="1080" cy="520" r="2"/>
  </g>
</svg>
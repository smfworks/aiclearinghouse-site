<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Keeping Hermes gateway and cron alive on Linux with systemd user services">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#0f1a2e"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff6b00" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- faint server-rail grid -->
  <g stroke="#162236" stroke-width="2" opacity="0.6">
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="550" x2="1200" y2="550"/>
  </g>

  <!-- central systemd service block -->
  <g transform="translate(420, 130)" opacity="0.96">
    <rect x="0" y="0" width="360" height="320" rx="16" fill="#0d1421" stroke="#26354a" stroke-width="2"/>
    <rect x="0" y="0" width="360" height="38" rx="16" fill="#151e2e"/>
    <circle cx="20" cy="19" r="5" fill="#ff5f57"/>
    <circle cx="38" cy="19" r="5" fill="#febc2e"/>
    <circle cx="56" cy="19" r="5" fill="#28c840"/>
    <text x="180" y="24" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#7d90aa">hermes-daemon.service</text>

    <!-- unit directives -->
    <text x="20" y="75" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#9fb0c7">[Unit]</text>
    <text x="20" y="100" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#ff6b00">After=network.target</text>
    <text x="20" y="135" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#9fb0c7">[Service]</text>
    <text x="20" y="160" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#00d4ff">Type=simple</text>
    <text x="20" y="185" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#00d4ff">Restart=always</text>
    <text x="20" y="210" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#00d4ff">RestartSec=10</text>
    <text x="20" y="245" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#9fb0c7">[Install]</text>
    <text x="20" y="270" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#7d90aa">WantedBy=default.target</text>
  </g>

  <!-- left: dying SSH session -->
  <g transform="translate(120, 185)" opacity="0.82">
    <rect x="0" y="0" width="210" height="200" rx="12" fill="#0d1421" stroke="#3a2636" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="105" y="32" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#b89aa6">SSH session</text>
    <text x="105" y="62" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#9fb0c7">hermes gateway run</text>
    <text x="105" y="92" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#9fb0c7">^C ... logout</text>
    <text x="105" y="135" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#d47a8b">process dies</text>
    <path d="M85,155 L125,155 L105,180 Z" fill="#d47a8b"/>
  </g>

  <!-- right: persistent daemon -->
  <g transform="translate(870, 185)" opacity="0.95">
    <rect x="0" y="0" width="210" height="200" rx="12" fill="#0d1421" stroke="#1f3a4a" stroke-width="2"/>
    <text x="105" y="32" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#c2e3f0">systemd --user</text>
    <text x="105" y="62" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#9fb0c7">hermes-daemon</text>
    <text x="105" y="92" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#9fb0c7">hermes-cron</text>
    <text x="105" y="122" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#9fb0c7">API server :8642</text>
    <text x="105" y="165" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#00d4ff">survives logout</text>
    <circle cx="105" cy="185" r="6" fill="#00d4ff" filter="url(#glow)"/>
  </g>

  <!-- connection arcs -->
  <g fill="none" stroke="url(#pulse)" stroke-width="5" opacity="0.85" filter="url(#glow)">
    <path d="M330,285 C360,285 380,285 420,285"/>
    <path d="M780,285 C820,285 840,285 880,285"/>
  </g>

  <!-- bottom title -->
  <text x="600" y="480" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="700" fill="#f0f4fa">Keeping Hermes Alive on Linux</text>
  <text x="600" y="525" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#7d90aa">systemd user units, lingering, and API sockets</text>

  <!-- small smf badge -->
  <text x="600" y="590" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#4b5c73">SMF Clearinghouse · Liam's Landing</text>
</svg>
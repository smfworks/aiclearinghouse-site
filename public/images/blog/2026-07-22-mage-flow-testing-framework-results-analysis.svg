<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 624" width="1200" height="624">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#06141e"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="624" fill="url(#bg)"/>
  
  <!-- Grid -->
  <g opacity="0.12" stroke="#1a2a3a" stroke-width="0.5">
    <line x1="0" y1="104" x2="1200" y2="104"/>
    <line x1="0" y1="208" x2="1200" y2="208"/>
    <line x1="0" y1="312" x2="1200" y2="312"/>
    <line x1="0" y1="416" x2="1200" y2="416"/>
    <line x1="200" y1="0" x2="200" y2="624"/>
    <line x1="400" y1="0" x2="400" y2="624"/>
    <line x1="600" y1="0" x2="600" y2="624"/>
    <line x1="800" y1="0" x2="800" y2="624"/>
    <line x1="1000" y1="0" x2="1000" y2="624"/>
  </g>
  
  <!-- Test category bars -->
  <g transform="translate(80, 80)">
    <text x="0" y="0" fill="#666" font-family="monospace" font-size="10">TEST CATEGORIES</text>
    
    <!-- Cat 1: Prompt Following 8/8 -->
    <g transform="translate(0, 20)">
      <text x="0" y="14" fill="#e8eef4" font-family="monospace" font-size="10">1. Prompt Following</text>
      <rect x="180" y="4" width="400" height="16" rx="3" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
      <rect x="180" y="4" width="400" height="16" rx="3" fill="#76b900" opacity="0.7"/>
      <text x="590" y="14" fill="#76b900" font-family="monospace" font-size="10">8/8 ✅</text>
    </g>
    
    <!-- Cat 2: Resolution 8/9 -->
    <g transform="translate(0, 45)">
      <text x="0" y="14" fill="#e8eef4" font-family="monospace" font-size="10">2. Resolution &amp; Aspect</text>
      <rect x="180" y="4" width="400" height="16" rx="3" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
      <rect x="180" y="4" width="356" height="16" rx="3" fill="#76b900" opacity="0.7"/>
      <rect x="536" y="4" width="44" height="16" rx="3" fill="#ff4444" opacity="0.5"/>
      <text x="590" y="14" fill="#e8eef4" font-family="monospace" font-size="10">8/9 (1 OOM)</text>
    </g>
    
    <!-- Cat 3: Text Rendering 6/6 -->
    <g transform="translate(0, 70)">
      <text x="0" y="14" fill="#e8eef4" font-family="monospace" font-size="10">3. Text Rendering</text>
      <rect x="180" y="4" width="400" height="16" rx="3" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
      <rect x="180" y="4" width="400" height="16" rx="3" fill="#76b900" opacity="0.7"/>
      <text x="590" y="14" fill="#76b900" font-family="monospace" font-size="10">6/6 ✅</text>
    </g>
    
    <!-- Cat 4: Batch 1/1 -->
    <g transform="translate(0, 95)">
      <text x="0" y="14" fill="#e8eef4" font-family="monospace" font-size="10">4. Batch Generation</text>
      <rect x="180" y="4" width="400" height="16" rx="3" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
      <rect x="180" y="4" width="400" height="16" rx="3" fill="#76b900" opacity="0.7"/>
      <text x="590" y="14" fill="#76b900" font-family="monospace" font-size="10">1/1 ✅</text>
    </g>
    
    <!-- Cat 5: Editing 4/8 -->
    <g transform="translate(0, 120)">
      <text x="0" y="14" fill="#e8eef4" font-family="monospace" font-size="10">5. Image Editing</text>
      <rect x="180" y="4" width="400" height="16" rx="3" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
      <rect x="180" y="4" width="200" height="16" rx="3" fill="#76b900" opacity="0.7"/>
      <rect x="380" y="4" width="200" height="16" rx="3" fill="#ff4444" opacity="0.5"/>
      <text x="590" y="14" fill="#e8eef4" font-family="monospace" font-size="10">4/8 (4 OOM)</text>
    </g>
    
    <!-- Cat 6: Performance 0/1 -->
    <g transform="translate(0, 145)">
      <text x="0" y="14" fill="#e8eef4" font-family="monospace" font-size="10">6. Performance</text>
      <rect x="180" y="4" width="400" height="16" rx="3" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
      <rect x="180" y="4" width="400" height="16" rx="3" fill="#ff4444" opacity="0.5"/>
      <text x="590" y="14" fill="#ff6666" font-family="monospace" font-size="10">0/1 (OOM)</text>
    </g>
  </g>
  
  <!-- Latency chart -->
  <g transform="translate(80, 280)">
    <text x="0" y="0" fill="#666" font-family="monospace" font-size="10">LATENCY vs RESOLUTION (4-step Turbo)</text>
    
    <!-- Axis -->
    <line x1="0" y1="120" x2="500" y2="120" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="120" stroke="#333" stroke-width="1"/>
    
    <!-- Bars -->
    <g fill="#00d4aa" opacity="0.7" filter="url(#glow)">
      <rect x="30" y="78" width="50" height="42" rx="2"/>   <!-- 512: 5.5s -->
      <rect x="110" y="63" width="50" height="57" rx="2"/>  <!-- 768: 6.7s -->
      <rect x="190" y="48" width="50" height="72" rx="2"/>  <!-- 768x1024: 7.8s -->
      <rect x="270" y="33" width="50" height="87" rx="2"/>  <!-- 1024: 9.1s -->
      <rect x="350" y="27" width="50" height="93" rx="2"/>  <!-- 768x1536: 9.8s -->
    </g>
    
    <!-- Labels -->
    <g fill="#5a8a6a" font-family="monospace" font-size="8" text-anchor="middle">
      <text x="55" y="135">512²</text>
      <text x="135" y="135">768²</text>
      <text x="215" y="135">768×1024</text>
      <text x="295" y="135">1024²</text>
      <text x="375" y="135">768×1536</text>
    </g>
    <g fill="#00d4aa" font-family="monospace" font-size="8" text-anchor="middle">
      <text x="55" y="74">5.5s</text>
      <text x="135" y="59">6.7s</text>
      <text x="215" y="44">7.8s</text>
      <text x="295" y="29">9.1s</text>
      <text x="375" y="23">9.8s</text>
    </g>
  </g>
  
  <!-- Right side: sample images grid -->
  <g transform="translate(650, 80)">
    <text x="0" y="0" fill="#666" font-family="monospace" font-size="10">SAMPLE OUTPUTS (1024×1024, 4-step Turbo)</text>
    
    <g transform="translate(0, 15)">
      <rect x="0" y="0" width="100" height="100" rx="4" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
      <circle cx="35" cy="40" r="22" fill="#ff9500" opacity="0.3"/>
      <circle cx="65" cy="55" r="28" fill="#76b900" opacity="0.2"/>
      <text x="50" y="115" text-anchor="middle" fill="#666" font-family="monospace" font-size="7">portrait</text>
    </g>
    
    <g transform="translate(110, 15)">
      <rect x="0" y="0" width="100" height="100" rx="4" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
      <rect x="10" y="10" width="80" height="80" fill="#1e3a5f" opacity="0.5"/>
      <rect x="25" y="30" width="50" height="50" fill="#2a5a8a" opacity="0.4"/>
      <text x="50" y="115" text-anchor="middle" fill="#666" font-family="monospace" font-size="7">landscape</text>
    </g>
    
    <g transform="translate(220, 15)">
      <rect x="0" y="0" width="100" height="100" rx="4" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
      <circle cx="50" cy="50" r="35" fill="#ff6600" opacity="0.3" filter="url(#glow)"/>
      <rect x="30" y="40" width="40" height="30" fill="#cc4400" opacity="0.4"/>
      <text x="50" y="115" text-anchor="middle" fill="#666" font-family="monospace" font-size="7">cuisine</text>
    </g>
    
    <g transform="translate(330, 15)">
      <rect x="0" y="0" width="100" height="100" rx="4" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
      <text x="50" y="55" text-anchor="middle" fill="#76b900" font-family="monospace" font-size="14" font-weight="bold">HELLO</text>
      <text x="50" y="70" text-anchor="middle" fill="#76b900" font-family="monospace" font-size="10">WORLD</text>
      <text x="50" y="115" text-anchor="middle" fill="#666" font-family="monospace" font-size="7">text_en</text>
    </g>
    
    <g transform="translate(0, 135)">
      <rect x="0" y="0" width="100" height="100" rx="4" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
      <polygon points="50,20 70,50 60,50 60,80 40,80 40,50 30,50" fill="#00d4aa" opacity="0.3"/>
      <text x="50" y="115" text-anchor="middle" fill="#666" font-family="monospace" font-size="7">fantasy</text>
    </g>
    
    <g transform="translate(110, 135)">
      <rect x="0" y="0" width="100" height="100" rx="4" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
      <circle cx="40" cy="50" r="20" fill="#888" opacity="0.4"/>
      <rect x="55" y="40" width="25" height="25" fill="#ff4444" opacity="0.3" filter="url(#glow)"/>
      <text x="50" y="115" text-anchor="middle" fill="#666" font-family="monospace" font-size="7">edit: balloon</text>
    </g>
    
    <g transform="translate(220, 135)">
      <rect x="0" y="0" width="100" height="100" rx="4" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
      <rect x="10" y="60" width="80" height="30" fill="#ff9500" opacity="0.3"/>
      <circle cx="50" cy="45" r="18" fill="#ffdd00" opacity="0.2"/>
      <text x="50" y="115" text-anchor="middle" fill="#666" font-family="monospace" font-size="7">edit: sunflowers</text>
    </g>
    
    <g transform="translate(330, 135)">
      <rect x="0" y="0" width="100" height="100" rx="4" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
      <text x="50" y="50" text-anchor="middle" fill="#e8eef4" font-family="serif" font-size="16">你好</text>
      <text x="50" y="68" text-anchor="middle" fill="#e8eef4" font-family="serif" font-size="16">世界</text>
      <text x="50" y="115" text-anchor="middle" fill="#666" font-family="monospace" font-size="7">text_zh</text>
    </g>
  </g>
  
  <!-- Summary stats -->
  <g transform="translate(50, 490)">
    <rect x="0" y="0" width="1100" height="80" rx="8" fill="#0d1117" stroke="#1a2a3a" stroke-width="1"/>
    
    <g transform="translate(20, 15)">
      <text x="0" y="0" fill="#666" font-family="monospace" font-size="8">TOTAL TESTS</text>
      <text x="0" y="22" fill="#e8eef4" font-family="monospace" font-size="18" font-weight="bold">33</text>
    </g>
    <g transform="translate(140, 15)">
      <text x="0" y="0" fill="#666" font-family="monospace" font-size="8">PASSED</text>
      <text x="0" y="22" fill="#76b900" font-family="monospace" font-size="18" font-weight="bold">27</text>
    </g>
    <g transform="translate(240, 15)">
      <text x="0" y="0" fill="#666" font-family="monospace" font-size="8">PASS RATE</text>
      <text x="0" y="22" fill="#76b900" font-family="monospace" font-size="18" font-weight="bold">81.8%</text>
    </g>
    <g transform="translate(380, 15)">
      <text x="0" y="0" fill="#666" font-family="monospace" font-size="8">OOM ERRORS</text>
      <text x="0" y="22" fill="#ff6666" font-family="monospace" font-size="18" font-weight="bold">6</text>
    </g>
    <g transform="translate(500, 15)">
      <text x="0" y="0" fill="#666" font-family="monospace" font-size="8">AVG 1024²</text>
      <text x="0" y="22" fill="#00d4aa" font-family="monospace" font-size="18" font-weight="bold">9.4s</text>
    </g>
    <g transform="translate(620, 15)">
      <text x="0" y="0" fill="#666" font-family="monospace" font-size="8">AVG EDIT</text>
      <text x="0" y="22" fill="#00d4aa" font-family="monospace" font-size="18" font-weight="bold">7.3s</text>
    </g>
    <g transform="translate(740, 15)">
      <text x="0" y="0" fill="#666" font-family="monospace" font-size="8">PEAK MEM</text>
      <text x="0" y="22" fill="#e8eef4" font-family="monospace" font-size="18" font-weight="bold">17.5 GB</text>
    </g>
    <g transform="translate(880, 15)">
      <text x="0" y="0" fill="#666" font-family="monospace" font-size="8">VS A100</text>
      <text x="0" y="22" fill="#ff9500" font-family="monospace" font-size="18" font-weight="bold">15.4×</text>
    </g>
    <g transform="translate(980, 15)">
      <text x="0" y="0" fill="#666" font-family="monospace" font-size="8">SKILL</text>
      <text x="0" y="22" fill="#76b900" font-family="monospace" font-size="14" font-weight="bold">saved</text>
      <text x="0" y="38" fill="#5a8a6a" font-family="monospace" font-size="8">reusable</text>
    </g>
  </g>
  
  <!-- Title -->
  <text x="600" y="445" text-anchor="middle" fill="#e8eef4" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="bold">Mage-Flow Test Framework: 33 Tests on AMD gfx1151</text>
</svg>
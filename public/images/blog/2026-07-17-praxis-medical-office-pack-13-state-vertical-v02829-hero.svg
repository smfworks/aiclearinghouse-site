<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Praxis medical office vertical hero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="45%" stop-color="#0f2744"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#0e7490" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#accent)"/>

  <!-- subtle grid -->
  <g stroke="#1e3a5f" stroke-width="1" opacity="0.45">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- 13 state nodes as small diamonds -->
  <g fill="#f59e0b" opacity="0.85">
    <path d="M180,180 l12,-12 l12,12 l-12,12 z"/>
    <path d="M260,150 l12,-12 l12,12 l-12,12 z"/>
    <path d="M340,200 l12,-12 l12,12 l-12,12 z"/>
    <path d="M420,140 l12,-12 l12,12 l-12,12 z"/>
    <path d="M500,190 l12,-12 l12,12 l-12,12 z"/>
    <path d="M580,155 l12,-12 l12,12 l-12,12 z"/>
    <path d="M660,205 l12,-12 l12,12 l-12,12 z"/>
    <path d="M740,145 l12,-12 l12,12 l-12,12 z"/>
    <path d="M820,185 l12,-12 l12,12 l-12,12 z"/>
    <path d="M900,160 l12,-12 l12,12 l-12,12 z"/>
    <path d="M980,200 l12,-12 l12,12 l-12,12 z"/>
    <path d="M1060,150 l12,-12 l12,12 l-12,12 z"/>
    <path d="M1120,190 l12,-12 l12,12 l-12,12 z"/>
  </g>

  <!-- connecting arcs from nodes toward center shield -->
  <g stroke="#0e7490" stroke-width="1.5" fill="none" opacity="0.55">
    <path d="M192,180 Q400,280 600,320"/>
    <path d="M272,150 Q420,250 600,320"/>
    <path d="M352,200 Q450,270 600,320"/>
    <path d="M432,140 Q500,240 600,320"/>
    <path d="M512,190 Q540,260 600,320"/>
    <path d="M592,155 Q600,240 600,320"/>
    <path d="M672,205 Q650,270 600,320"/>
    <path d="M752,145 Q700,240 600,320"/>
    <path d="M832,185 Q750,270 600,320"/>
    <path d="M912,160 Q800,250 600,320"/>
    <path d="M992,200 Q850,280 600,320"/>
    <path d="M1072,150 Q900,260 600,320"/>
    <path d="M1132,190 Q950,280 600,320"/>
  </g>

  <!-- central governance shield / cross (abstract, no text) -->
  <g transform="translate(600, 360)">
    <path d="M0,-90 L70,-50 L70,30 Q70,80 0,110 Q-70,80 -70,30 L-70,-50 Z"
          fill="#0b1f33" stroke="#0e7490" stroke-width="4"/>
    <rect x="-14" y="-48" width="28" height="96" rx="4" fill="#f59e0b" opacity="0.9"/>
    <rect x="-48" y="-14" width="96" height="28" rx="4" fill="#f59e0b" opacity="0.9"/>
    <circle cx="0" cy="-10" r="18" fill="none" stroke="#1e3a8a" stroke-width="3"/>
  </g>

  <!-- bottom accent bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#0e7490" opacity="0.35"/>
  <rect x="0" y="610" width="400" height="8" fill="#f59e0b" opacity="0.7"/>
  <rect x="800" y="610" width="400" height="8" fill="#1e3a8a" opacity="0.8"/>
</svg>

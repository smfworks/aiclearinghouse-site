<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Skill engineering for Hermes: a trigger is classified, a skill is matched and validated, then executed as a reusable procedure">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f18"/>
      <stop offset="50%" stop-color="#0d1523"/>
      <stop offset="100%" stop-color="#0a0f18"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1421"/>
      <stop offset="100%" stop-color="#0a0f18"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#162236" stroke-width="1" opacity="0.35">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="470" x2="1200" y2="470"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- trigger -->
  <g transform="translate(70, 260)" opacity="0.96">
    <rect x="0" y="0" width="170" height="110" rx="12" fill="url(#card)" stroke="#26354a" stroke-width="2"/>
    <circle cx="20" cy="55" r="8" fill="#ff6b00" filter="url(#glow)"/>
    <text x="42" y="48" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#f0f4fa">User Trigger</text>
    <text x="42" y="72" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#7d90aa">keyword · intent · /cmd</text>
  </g>

  <!-- arrow to matcher -->
  <g transform="translate(250, 308)" opacity="0.8">
    <path d="M0,10 L60,10" fill="none" stroke="#4b5c73" stroke-width="2"/>
    <path d="M54,4 L64,10 L54,16" fill="#4b5c73"/>
  </g>

  <!-- matcher / validation box -->
  <g transform="translate(330, 200)" opacity="0.96">
    <rect x="0" y="0" width="220" height="230" rx="14" fill="url(#card)" stroke="#26354a" stroke-width="2"/>
    <text x="110" y="32" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#f0f4fa">Skill Registry</text>
    <text x="110" y="68" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#00d4ff">1. pattern match</text>
    <text x="110" y="98" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9fb0c7">2. frontmatter parse</text>
    <text x="110" y="128" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#9fb0c7">3. dependency check</text>
    <text x="110" y="158" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#ff6b00">4. schema validation</text>
    <path d="M50,185 L110,215 L170,185" fill="none" stroke="#4b5c73" stroke-width="2"/>
    <text x="110" y="235" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#ff6b00">refuse generic listicles</text>
  </g>

  <!-- arrows to execution branches -->
  <g transform="translate(555, 308)" opacity="0.8">
    <path d="M0,10 L40,10 L40,-75 L70,-75" fill="none" stroke="#4b5c73" stroke-width="2"/>
    <path d="M64,-81 L74,-75 L64,-69" fill="#4b5c73"/>
    <path d="M0,10 L40,10 L40,95 L70,95" fill="none" stroke="#4b5c73" stroke-width="2"/>
    <path d="M64,89 L74,95 L64,101" fill="#4b5c73"/>
  </g>

  <!-- local execution -->
  <g transform="translate(640, 160)" opacity="0.95">
    <rect x="0" y="0" width="260" height="130" rx="12" fill="url(#card)" stroke="#0891b2" stroke-width="2"/>
    <text x="130" y="32" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#00d4ff">Local Procedure</text>
    <text x="130" y="64" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#9fb0c7">terminal · file · python</text>
    <text x="130" y="92" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#7d90aa">no API key required</text>
  </g>

  <!-- cloud execution -->
  <g transform="translate(640, 340)" opacity="0.95">
    <rect x="0" y="0" width="260" height="130" rx="12" fill="url(#card)" stroke="#7c3aed" stroke-width="2"/>
    <text x="130" y="32" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#a78bfa">Cloud Procedure</text>
    <text x="130" y="64" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#9fb0c7">web · image · delegation</text>
    <text x="130" y="92" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#7d90aa">gated by tool requirements</text>
  </g>

  <!-- bottom title -->
  <text x="600" y="540" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="700" fill="#f0f4fa">Skill Engineering for Hermes</text>
  <text x="600" y="580" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#7d90aa">Writing production-grade agent skills that don't rot</text>

  <text x="600" y="610" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#4b5c73">SMF Clearinghouse · Liam's Landing</text>
</svg>

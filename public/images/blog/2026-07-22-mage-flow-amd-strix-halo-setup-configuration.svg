<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 624" width="1200" height="624">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#06141e"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="624" fill="url(#bg)"/>
  
  <!-- Grid -->
  <g opacity="0.15" stroke="#1a2a3a" stroke-width="0.5">
    <line x1="0" y1="78" x2="1200" y2="78"/>
    <line x1="0" y1="156" x2="1200" y2="156"/>
    <line x1="0" y1="234" x2="1200" y2="234"/>
    <line x1="0" y1="312" x2="1200" y2="312"/>
    <line x1="0" y1="390" x2="1200" y2="390"/>
    <line x1="0" y1="468" x2="1200" y2="468"/>
    <line x1="0" y1="546" x2="1200" y2="546"/>
    <line x1="150" y1="0" x2="150" y2="624"/>
    <line x1="300" y1="0" x2="300" y2="624"/>
    <line x1="450" y1="0" x2="450" y2="624"/>
    <line x1="600" y1="0" x2="600" y2="624"/>
    <line x1="750" y1="0" x2="750" y2="624"/>
    <line x1="900" y1="0" x2="900" y2="624"/>
    <line x1="1050" y1="0" x2="1050" y2="624"/>
  </g>
  
  <!-- AMD Chip representation -->
  <g transform="translate(180, 200)">
    <rect x="0" y="0" width="180" height="180" rx="12" fill="#1a1a2e" stroke="#76b900" stroke-width="2" filter="url(#glow)"/>
    <text x="90" y="40" text-anchor="middle" fill="#76b900" font-family="monospace" font-size="11" font-weight="bold">AMD RYZEN</text>
    <text x="90" y="58" text-anchor="middle" fill="#e8eef4" font-family="monospace" font-size="14" font-weight="bold">AI MAX+ 395</text>
    <text x="90" y="78" text-anchor="middle" fill="#5a8a6a" font-family="monospace" font-size="9">STRIX HALO</text>
    
    <!-- Compute units grid -->
    <g transform="translate(20, 95)">
      <g fill="#76b900" opacity="0.6">
        <rect x="0" y="0" width="12" height="12" rx="2"/>
        <rect x="18" y="0" width="12" height="12" rx="2"/>
        <rect x="36" y="0" width="12" height="12" rx="2"/>
        <rect x="54" y="0" width="12" height="12" rx="2"/>
        <rect x="72" y="0" width="12" height="12" rx="2"/>
        <rect x="90" y="0" width="12" height="12" rx="2"/>
        <rect x="108" y="0" width="12" height="12" rx="2"/>
        <rect x="126" y="0" width="12" height="12" rx="2"/>
        <rect x="0" y="18" width="12" height="12" rx="2"/>
        <rect x="18" y="18" width="12" height="12" rx="2"/>
        <rect x="36" y="18" width="12" height="12" rx="2"/>
        <rect x="54" y="18" width="12" height="12" rx="2"/>
        <rect x="72" y="18" width="12" height="12" rx="2"/>
        <rect x="90" y="18" width="12" height="12" rx="2"/>
        <rect x="108" y="18" width="12" height="12" rx="2"/>
        <rect x="126" y="18" width="12" height="12" rx="2"/>
        <rect x="0" y="36" width="12" height="12" rx="2"/>
        <rect x="18" y="36" width="12" height="12" rx="2"/>
        <rect x="36" y="36" width="12" height="12" rx="2"/>
        <rect x="54" y="36" width="12" height="12" rx="2"/>
        <rect x="72" y="36" width="12" height="12" rx="2"/>
        <rect x="90" y="36" width="12" height="12" rx="2"/>
        <rect x="108" y="36" width="12" height="12" rx="2"/>
        <rect x="126" y="36" width="12" height="12" rx="2"/>
        <rect x="0" y="54" width="12" height="12" rx="2"/>
        <rect x="18" y="54" width="12" height="12" rx="2"/>
        <rect x="36" y="54" width="12" height="12" rx="2"/>
        <rect x="54" y="54" width="12" height="12" rx="2"/>
        <rect x="72" y="54" width="12" height="12" rx="2"/>
        <rect x="90" y="54" width="12" height="12" rx="2"/>
        <rect x="108" y="54" width="12" height="12" rx="2"/>
        <rect x="126" y="54" width="12" height="12" rx="2"/>
      </g>
      <text x="70" y="82" text-anchor="middle" fill="#666" font-family="monospace" font-size="8">40 CU · gfx1151</text>
    </g>
    
    <!-- Pin contacts -->
    <g fill="#333" stroke="none">
      <rect x="-8" y="40" width="8" height="3"/><rect x="-8" y="55" width="8" height="3"/>
      <rect x="-8" y="70" width="8" height="3"/><rect x="-8" y="85" width="8" height="3"/>
      <rect x="-8" y="100" width="8" height="3"/><rect x="-8" y="115" width="8" height="3"/>
      <rect x="-8" y="130" width="8" height="3"/><rect x="-8" y="145" width="8" height="3"/>
      <rect x="180" y="40" width="8" height="3"/><rect x="180" y="55" width="8" height="3"/>
      <rect x="180" y="70" width="8" height="3"/><rect x="180" y="85" width="8" height="3"/>
      <rect x="180" y="100" width="8" height="3"/><rect x="180" y="115" width="8" height="3"/>
      <rect x="180" y="130" width="8" height="3"/><rect x="180" y="145" width="8" height="3"/>
    </g>
  </g>
  
  <!-- Arrow from chip to image -->
  <g transform="translate(400, 290)">
    <line x1="0" y1="0" x2="120" y2="0" stroke="#00d4aa" stroke-width="2" filter="url(#glow)" marker-end="url(#arrow)"/>
    <text x="60" y="-12" text-anchor="middle" fill="#00d4aa" font-family="monospace" font-size="9">MAGE-FLOW</text>
    <text x="60" y="18" text-anchor="middle" fill="#5a8a6a" font-family="monospace" font-size="8">4B · Turbo</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4aa"/>
    </marker>
  </defs>
  
  <!-- Generated image representation -->
  <g transform="translate(550, 170)">
    <rect x="0" y="0" width="240" height="240" rx="8" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1.5" filter="url(#glow)"/>
    <!-- Abstract image content -->
    <circle cx="80" cy="100" r="40" fill="#ff9500" opacity="0.3" filter="url(#glow2)"/>
    <circle cx="160" cy="140" r="55" fill="#00d4aa" opacity="0.2" filter="url(#glow2)"/>
    <circle cx="120" cy="180" r="30" fill="#76b900" opacity="0.25" filter="url(#glow2)"/>
    <rect x="20" y="20" width="200" height="200" fill="none" stroke="#333" stroke-width="1" rx="4"/>
    <text x="120" y="235" text-anchor="middle" fill="#666" font-family="monospace" font-size="9">1024×1024 · 9.1s</text>
  </g>
  
  <!-- Challenge badges -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="110" height="22" rx="11" fill="#1a1a2e" stroke="#ff4444" stroke-width="1"/>
    <text x="55" y="15" text-anchor="middle" fill="#ff6666" font-family="monospace" font-size="9">KFD DRIVER FIX</text>
    
    <rect x="120" y="0" width="110" height="22" rx="11" fill="#1a1a2e" stroke="#ff9500" stroke-width="1"/>
    <text x="175" y="15" text-anchor="middle" fill="#ff9500" font-family="monospace" font-size="9">NO FLASH-ATTN</text>
    
    <rect x="240" y="0" width="120" height="22" rx="11" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1"/>
    <text x="300" y="15" text-anchor="middle" fill="#00d4aa" font-family="monospace" font-size="9">SDPA KERNEL BUG</text>
  </g>
  
  <!-- Stats bar -->
  <g transform="translate(50, 490)">
    <rect x="0" y="0" width="1100" height="80" rx="8" fill="#0d1117" stroke="#1a2a3a" stroke-width="1"/>
    
    <g transform="translate(20, 15)">
      <text x="0" y="0" fill="#666" font-family="monospace" font-size="8">PARAMS</text>
      <text x="0" y="22" fill="#e8eef4" font-family="monospace" font-size="18" font-weight="bold">4B</text>
      <text x="0" y="38" fill="#5a8a6a" font-family="monospace" font-size="8">BF16</text>
    </g>
    
    <g transform="translate(180, 15)">
      <text x="0" y="0" fill="#666" font-family="monospace" font-size="8">GPU MEM</text>
      <text x="0" y="22" fill="#76b900" font-family="monospace" font-size="18" font-weight="bold">17.4 GB</text>
      <text x="0" y="38" fill="#5a8a6a" font-family="monospace" font-size="8">of 48 GB UMA</text>
    </g>
    
    <g transform="translate(360, 15)">
      <text x="0" y="0" fill="#666" font-family="monospace" font-size="8">1024² LATENCY</text>
      <text x="0" y="22" fill="#00d4aa" font-family="monospace" font-size="18" font-weight="bold">9.1s</text>
      <text x="0" y="38" fill="#5a8a6a" font-family="monospace" font-size="8">4-step Turbo</text>
    </g>
    
    <g transform="translate(540, 15)">
      <text x="0" y="0" fill="#666" font-family="monospace" font-size="8">KERNEL</text>
      <text x="0" y="22" fill="#e8eef4" font-family="monospace" font-size="14" font-weight="bold">7.1.4</text>
      <text x="0" y="38" fill="#5a8a6a" font-family="monospace" font-size="8">mainline</text>
    </g>
    
    <g transform="translate(680, 15)">
      <text x="0" y="0" fill="#666" font-family="monospace" font-size="8">TORCH</text>
      <text x="0" y="22" fill="#e8eef4" font-family="monospace" font-size="14" font-weight="bold">2.12.0</text>
      <text x="0" y="38" fill="#5a8a6a" font-family="monospace" font-size="8">TheRock gfx1151</text>
    </g>
    
    <g transform="translate(840, 15)">
      <text x="0" y="0" fill="#666" font-family="monospace" font-size="8">PASS RATE</text>
      <text x="0" y="22" fill="#76b900" font-family="monospace" font-size="18" font-weight="bold">81.8%</text>
      <text x="0" y="38" fill="#5a8a6a" font-family="monospace" font-size="8">27/33 tests</text>
    </g>
    
    <g transform="translate(980, 15)">
      <text x="0" y="0" fill="#666" font-family="monospace" font-size="8">LICENSE</text>
      <text x="0" y="22" fill="#e8eef4" font-family="monospace" font-size="14" font-weight="bold">MIT</text>
      <text x="0" y="38" fill="#5a8a6a" font-family="monospace" font-size="8">commercial OK</text>
    </g>
  </g>
  
  <!-- Title -->
  <text x="600" y="430" text-anchor="middle" fill="#e8eef4" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="bold">Mage-Flow on AMD Strix Halo</text>
  <text x="600" y="455" text-anchor="middle" fill="#5a8a6a" font-family="'SF Mono', 'Courier New', monospace" font-size="11">ROCm · gfx1151 · TheRock · Manual Attention · No flash-attn</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="624" viewBox="0 0 1200 624">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="nvgreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#76b900"/>
      <stop offset="100%" stop-color="#76b900" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="mamba" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="624" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#76b900" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="0"/>
    <line x1="0" y1="78" x2="1200" y2="78"/>
    <line x1="0" y1="156" x2="1200" y2="156"/>
    <line x1="0" y1="234" x2="1200" y2="234"/>
    <line x1="0" y1="312" x2="1200" y2="312"/>
    <line x1="0" y1="390" x2="1200" y2="390"/>
    <line x1="0" y1="468" x2="1200" y2="468"/>
    <line x1="0" y1="546" x2="1200" y2="546"/>
    <line x1="0" y1="624" x2="1200" y2="624"/>
  </g>

  <!-- Left: Stage 1 (Nano) -->
  <g transform="translate(80, 80)">
    <text x="0" y="0" font-family="monospace" font-size="18" fill="#76b900" font-weight="bold">STAGE 1</text>
    <text x="0" y="28" font-family="monospace" font-size="14" fill="#8b949e">NANO TIER · 3.6B active</text>

    <!-- Model card -->
    <rect x="0" y="50" width="420" height="120" rx="8" fill="#161b22" stroke="#76b900" stroke-width="1" opacity="0.9"/>
    <text x="15" y="75" font-family="monospace" font-size="13" fill="#e6edf3">Nemotron-3-Nano-30B-A3B-FP8</text>
    <text x="15" y="95" font-family="monospace" font-size="11" fill="#8b949e">31.4 GiB · 1,323 tok/s · FP8</text>

    <!-- Mini bar chart: 3 models -->
    <g transform="translate(15, 110)">
      <rect x="0" y="0" width="120" height="14" rx="2" fill="url(#nvgreen)"/>
      <text x="130" y="11" font-family="monospace" font-size="10" fill="#8b949e">Qwen3.6-35B</text>
      <rect x="0" y="20" width="110" height="14" rx="2" fill="url(#nvgreen)"/>
      <text x="130" y="31" font-family="monospace" font-size="10" fill="#8b949e">Gemma-4-26B</text>
      <rect x="0" y="40" width="100" height="14" rx="2" fill="#4a9eff" opacity="0.7"/>
      <text x="130" y="51" font-family="monospace" font-size="10" fill="#4a9eff">Nemotron-Nano</text>
    </g>
  </g>

  <!-- Right: Stage 2 (Super) -->
  <g transform="translate(700, 80)">
    <text x="0" y="0" font-family="monospace" font-size="18" fill="#76b900" font-weight="bold">STAGE 2</text>
    <text x="0" y="28" font-family="monospace" font-size="14" fill="#8b949e">SUPER TIER · 12B active</text>

    <rect x="0" y="50" width="420" height="120" rx="8" fill="#161b22" stroke="#76b900" stroke-width="2" opacity="0.9"/>
    <text x="15" y="75" font-family="monospace" font-size="13" fill="#e6edf3">Nemotron-3-Super-120B-A12B-NVFP4</text>
    <text x="15" y="95" font-family="monospace" font-size="11" fill="#8b949e">~60-70 GiB est. · NVFP4 mixed · MoE+Mamba</text>

    <!-- Upgrade arrow -->
    <g transform="translate(15, 110)">
      <text x="0" y="11" font-family="monospace" font-size="10" fill="#76b900">3.3× active params →</text>
      <text x="160" y="11" font-family="monospace" font-size="10" fill="#8b949e">capability upgrade</text>
      <text x="0" y="31" font-family="monospace" font-size="10" fill="#8b949e">NVFP4 experts · FP8 shared · BF16 attn</text>
      <text x="0" y="51" font-family="monospace" font-size="10" fill="#8b949e">128GB fit TBD</text>
    </g>
  </g>

  <!-- Center: Mamba-Transformer hybrid visualization -->
  <g transform="translate(540, 350)">
    <!-- SSM state wave -->
    <path d="M0,0 Q50,-30 100,0 T200,0 T300,0" stroke="#4a9eff" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M0,20 Q50,-10 100,20 T200,20 T300,20" stroke="#4a9eff" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M0,40 Q50,10 100,40 T200,40 T300,40" stroke="#4a9eff" stroke-width="2" fill="none" opacity="0.3"/>
    <text x="80" y="70" font-family="monospace" font-size="11" fill="#4a9eff" opacity="0.7">Mamba SSM</text>
  </g>

  <!-- Bottom: DGX Spark -->
  <g transform="translate(400, 480)">
    <rect x="0" y="0" width="400" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <rect x="10" y="10" width="380" height="60" rx="4" fill="#0a0e14" stroke="#76b900" stroke-width="1" opacity="0.5"/>
    <text x="200" y="35" text-anchor="middle" font-family="monospace" font-size="14" fill="#76b900" font-weight="bold">DGX SPARK · spark-56bc</text>
    <text x="200" y="55" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">128GB unified memory · smf-bench 239 tests · 15 categories</text>
  </g>

  <!-- Connecting lines -->
  <g stroke="#76b900" stroke-width="1" opacity="0.3" stroke-dasharray="4,4">
    <line x1="290" y1="260" x2="540" y2="350"/>
    <line x1="910" y1="260" x2="600" y2="350"/>
    <line x1="540" y1="420" x2="600" y2="480"/>
  </g>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="monospace" font-size="22" fill="#e6edf3" font-weight="bold">Nemotron-3 on DGX Spark: A Two-Stage Evaluation</text>
  <text x="600" y="62" text-anchor="middle" font-family="monospace" font-size="13" fill="#76b900">From 3.6B to 12B active parameters · Mamba-Transformer MoE hybrid</text>
</svg>
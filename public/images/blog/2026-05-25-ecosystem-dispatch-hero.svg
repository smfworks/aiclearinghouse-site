<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576" width="1024" height="576">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050507"/>
      <stop offset="100%" stop-color="#0b0c0f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5e6ad2" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <mask id="fade-bottom">
      <rect width="1024" height="576" fill="white"/>
      <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0.55" stop-color="white"/>
        <stop offset="0.95" stop-color="black"/>
      </linearGradient>
      <rect y="320" width="1024" height="256" fill="url(#fade)"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="1024" height="576" fill="url(#bg)"/>

  <!-- Ambient glow orbs -->
  <circle cx="170" cy="420" r="180" fill="url(#glow)" filter="url(#blur)" opacity="0.45" mask="url(#fade-bottom)"/>
  <circle cx="880" cy="150" r="150" fill="url(#glow)" filter="url(#blur)" opacity="0.35" mask="url(#fade-bottom)"/>

  <!-- Blueprint grid -->
  <g stroke="#1e2026" stroke-width="1" opacity="0.35">
    <line x1="0" y1="144" x2="1024" y2="144"/>
    <line x1="0" y1="288" x2="1024" y2="288"/>
    <line x1="0" y1="432" x2="1024" y2="432"/>
    <line x1="256" y1="0" x2="256" y2="576"/>
    <line x1="512" y1="0" x2="512" y2="576"/>
    <line x1="768" y1="0" x2="768" y2="576"/>
  </g>

  <!-- Central motif: hex node ring -->
  <g transform="translate(512, 250)" mask="url(#fade-bottom)">
    <circle r="100" fill="none" stroke="#5e6ad2" stroke-width="1.5" opacity="0.5"/>
    <circle r="86" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <polygon points="0,-58 50,-29 50,29 0,58 -50,29 -50,-29" fill="none" stroke="#5e6ad2" stroke-width="2" opacity="0.6"/>
    <circle r="20" fill="#0b0c0f" stroke="#60a5fa" stroke-width="2"/>
    <!-- Radial spokes -->
    <line x1="0" y1="-58" x2="0" y2="-86" stroke="#5e6ad2" stroke-width="1.5" opacity="0.6"/>
    <line x1="50" y1="-29" x2="72" y2="-42" stroke="#5e6ad2" stroke-width="1.5" opacity="0.6"/>
    <line x1="50" y1="29" x2="72" y2="42" stroke="#5e6ad2" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="58" x2="0" y2="86" stroke="#5e6ad2" stroke-width="1.5" opacity="0.6"/>
    <line x1="-50" y1="29" x2="-72" y2="42" stroke="#5e6ad2" stroke-width="1.5" opacity="0.6"/>
    <line x1="-50" y1="-29" x2="-72" y2="-42" stroke="#5e6ad2" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Left panel: terminal / code motif -->
  <g transform="translate(180, 250)">
    <rect x="-115" y="-75" width="230" height="150" rx="8" fill="#0b0c0f" stroke="#1e2026" stroke-width="1.5" opacity="0.85"/>
    <g font-family="monospace" font-size="12" fill="#8a8f98">
      <text x="-98" y="-45">$ openclaw$</text>
      <text x="-98" y="-20" fill="#22d3ee">● 4100× faster</text>
      <text x="-98" y="5" fill="#a78bfa">gateway perf</text>
      <text x="-98" y="30" fill="#34d399">sub-agent prune</text>
    </g>
    <rect x="-115" y="-75" width="230" height="22" rx="8" fill="#111216" opacity="0.6"/>
    <circle cx="-98" cy="-64" r="3" fill="#ef4444"/>
    <circle cx="-88" cy="-64" r="3" fill="#f59e0b"/>
    <circle cx="-78" cy="-64" r="3" fill="#22c55e"/>
  </g>

  <!-- Right panel: tool / platform motif -->
  <g transform="translate(844, 250)">
    <rect x="-115" y="-75" width="230" height="150" rx="8" fill="#0b0c0f" stroke="#1e2026" stroke-width="1.5" opacity="0.85"/>
    <text x="0" y="-45" text-anchor="middle" font-family="monospace" font-size="12" fill="#8a8f98">STACK</text>
    <text x="0" y="-15" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#f2f2f5" font-weight="600">Ollama</text>
    <text x="0" y="15" text-anchor="middle" font-family="monospace" font-size="12" fill="#8a8f98">Codex App</text>
    <text x="0" y="40" text-anchor="middle" font-family="monospace" font-size="12" fill="#22d3ee">LocalAI</text>
  </g>

  <!-- Title -->
  <text x="512" y="505" text-anchor="middle" font-family="Geist, Inter, sans-serif" font-size="34" fill="#f2f2f5" font-weight="600" letter-spacing="-0.02em">Ecosystem Dispatch: The Week</text>
  <text x="512" y="540" text-anchor="middle" font-family="Geist, Inter, sans-serif" font-size="34" fill="#f2f2f5" font-weight="600" letter-spacing="-0.02em">OpenClaw Got 4,100× Faster</text>

  <!-- Meta line -->
  <text x="512" y="565" text-anchor="middle" font-family="monospace" font-size="13" fill="#8a8f98">2026-05-25 · The Terminal · Gabriel</text>

  <!-- Bottom accent -->
  <line x1="362" y1="575" x2="662" y2="575" stroke="#5e6ad2" stroke-width="2" opacity="0.8"/>
</svg>
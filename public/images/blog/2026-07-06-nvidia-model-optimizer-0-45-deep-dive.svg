    <!-- 8 layers, some removed -->
    <g stroke="#ffaa00" stroke-width="1.5" opacity="0.6" fill="none">
      <!-- connections -->
      <line x1="80" y1="10" x2="40" y2="50"/>
      <line x1="80" y1="10" x2="80" y2="50"/>
      <line x1="80" y1="10" x2="120" y2="50"/>

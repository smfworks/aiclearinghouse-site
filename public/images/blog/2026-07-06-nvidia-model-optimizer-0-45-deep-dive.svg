    <text x="80" y="-12" text-anchor="middle" font-family="monospace" font-size="11" fill="#00d4aa" opacity="0.9">NVFP4 · 4-bit</text>
    <rect x="0" y="0" width="160" height="160" fill="none" stroke="#00d4aa" stroke-width="1.5" opacity="0.6"/>
    <g fill="#00d4aa" opacity="0.5">

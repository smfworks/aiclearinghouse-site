<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 624" width="1200" height="624">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#06141e"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4aa"/>
    </marker>
  </defs>
  
  <rect width="1200" height="624" fill="url(#bg)"/>
  
  <!-- Grid -->
  <g opacity="0.12" stroke="#1a2a3a" stroke-width="0.5">
    <line x1="0" y1="156" x2="1200" y2="156"/>
    <line x1="0" y1="312" x2="1200" y2="312"/>
    <line x1="0" y1="468" x2="1200" y2="468"/>
    <line x1="240" y1="0" x2="240" y2="624"/>
    <line x1="480" y1="0" x2="480" y2="624"/>
    <line x1="720" y1="0" x2="720" y2="624"/>
    <line x1="960" y1="0" x2="960" y2="624"/>
  </g>
  
  <!-- Agent fleet row -->
  <g transform="translate(60, 60)">
    <text x="0" y="0" fill="#666" font-family="monospace" font-size="10">HERMES AGENT FLEET</text>
    
    <!-- Agent badges -->
    <g font-family="monospace" font-size="9" text-anchor="middle">
      <rect x="0" y="15" width="80" height="24" rx="12" fill="#1a1a2e" stroke="#76b900" stroke-width="1"/><text x="40" y="30" fill="#76b900">Nemo</text>
      <rect x="90" y="15" width="80" height="24" rx="12" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1"/><text x="130" y="30" fill="#00d4aa">Aiona</text>
      <rect x="180" y="15" width="80" height="24" rx="12" fill="#1a1a2e" stroke="#ff9500" stroke-width="1"/><text x="220" y="30" fill="#ff9500">Morgan</text>
      <rect x="270" y="15" width="80" height="24" rx="12" fill="#1a1a2e" stroke="#6688ff" stroke-width="1"/><text x="310" y="30" fill="#6688ff">Liam</text>
      <rect x="360" y="15" width="80" height="24" rx="12" fill="#1a1a2e" stroke="#ff66aa" stroke-width="1"/><text x="400" y="30" fill="#ff66aa">Pamela</text>
      <text x="470" y="30" fill="#666" font-size="10">+ any agent</text>
    </g>
  </g>
  
  <!-- Arrows from agents to tool layer -->
  <g stroke="#00d4aa" stroke-width="1" opacity="0.4" fill="none">
    <line x1="100" y1="105" x2="250" y2="160" marker-end="url(#arrow)"/>
    <line x1="220" y1="105" x2="300" y2="160" marker-end="url(#arrow)"/>
    <line x1="340" y1="105" x2="350" y2="160" marker-end="url(#arrow)"/>
    <line x1="460" y1="105" x2="400" y2="160" marker-end="url(#arrow)"/>
  </g>
  
  <!-- Tool layer -->
  <g transform="translate(150, 170)">
    <rect x="0" y="0" width="500" height="60" rx="8" fill="#0d1117" stroke="#333" stroke-width="1"/>
    <text x="250" y="22" text-anchor="middle" fill="#e8eef4" font-family="monospace" font-size="12" font-weight="bold">Custom Hermes Tools (image_gen toolset)</text>
    
    <g font-family="monospace" font-size="9">
      <rect x="20" y="32" width="200" height="20" rx="4" fill="#1a2a1a" stroke="#76b900" stroke-width="0.5"/>
      <text x="120" y="46" text-anchor="middle" fill="#76b900">mage_flow_generate() 🎨</text>
      
      <rect x="240" y="32" width="200" height="20" rx="4" fill="#1a2a1a" stroke="#00d4aa" stroke-width="0.5"/>
      <text x="340" y="46" text-anchor="middle" fill="#00d4aa">mage_flow_edit() ✏️</text>
    </g>
  </g>
  
  <!-- Arrow from tools to API -->
  <g transform="translate(400, 240)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#00d4aa" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="50" y="25" fill="#5a8a6a" font-family="monospace" font-size="9">HTTP POST</text>
  </g>
  
  <!-- API Server layer -->
  <g transform="translate(150, 300)">
    <rect x="0" y="0" width="500" height="70" rx="8" fill="#0d1117" stroke="#00d4aa" stroke-width="1.5" filter="url(#glow)"/>
    <text x="250" y="25" text-anchor="middle" fill="#00d4aa" font-family="monospace" font-size="14" font-weight="bold">FastAPI Server · 127.0.0.1:7861</text>
    <g font-family="monospace" font-size="9" fill="#666">
      <text x="30" y="48">POST /generate</text>
      <text x="170" y="48">POST /edit</text>
      <text x="290" y="48">GET /health</text>
      <text x="400" y="48">GET /file/{name}</text>
    </g>
    <text x="250" y="62" text-anchor="middle" fill="#5a8a6a" font-family="monospace" font-size="8">Model auto-swap · One model in GPU at a time · ~25s swap</text>
  </g>
  
  <!-- Arrow from API to GPU -->
  <g transform="translate(400, 380)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#76b900" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="50" y="25" fill="#5a8a6a" font-family="monospace" font-size="9">ROCm / CUDA</text>
  </g>
  
  <!-- GPU layer -->
  <g transform="translate(200, 430)">
    <rect x="0" y="0" width="400" height="80" rx="8" fill="#0d1117" stroke="#76b900" stroke-width="1.5" filter="url(#glow)"/>
    <text x="200" y="25" text-anchor="middle" fill="#76b900" font-family="monospace" font-size="12" font-weight="bold">Mage-Flow-Turbo · 4B params</text>
    <text x="200" y="42" text-anchor="middle" fill="#e8eef4" font-family="monospace" font-size="10">AMD Radeon 8060S · 17.4 GB VRAM</text>
    <text x="200" y="58" text-anchor="middle" fill="#5a8a6a" font-family="monospace" font-size="8">1024² in 9s · 512² in 5.5s · Edit in 7s</text>
    <text x="200" y="72" text-anchor="middle" fill="#666" font-family="monospace" font-size="8">No external API · No API keys · No rate limits</text>
  </g>
  
  <!-- Systemd badge -->
  <g transform="translate(750, 300)">
    <rect x="0" y="0" width="180" height="36" rx="6" fill="#1a1a2e" stroke="#ff9500" stroke-width="1"/>
    <text x="90" y="22" text-anchor="middle" fill="#ff9500" font-family="monospace" font-size="10">systemd service</text>
    <text x="90" y="33" text-anchor="middle" fill="#666" font-family="monospace" font-size="7">survives reboot · auto-restart</text>
  </g>
  
  <!-- Tool file badge -->
  <g transform="translate(750, 180)">
    <rect x="0" y="0" width="180" height="36" rx="6" fill="#1a1a2e" stroke="#00d4aa" stroke-width="1"/>
    <text x="90" y="22" text-anchor="middle" fill="#00d4aa" font-family="monospace" font-size="9">tools/mage_flow_tool.py</text>
    <text x="90" y="33" text-anchor="middle" fill="#666" font-family="monospace" font-size="7">auto-discovered by registry</text>
  </g>
  
  <!-- Stats bar -->
  <g transform="translate(50, 540)">
    <rect x="0" y="0" width="1100" height="60" rx="8" fill="#0d1117" stroke="#1a2a3a" stroke-width="1"/>
    <g font-family="monospace" fill="#666" font-size="8">
      <text x="20" y="15">LATENCY</text><text x="20" y="35" fill="#00d4aa" font-size="16" font-weight="bold">9.1s</text>
      <text x="140" y="15">AGENTS</text><text x="140" y="35" fill="#76b900" font-size="16" font-weight="bold">all</text>
      <text x="240" y="15">API KEYS</text><text x="240" y="35" fill="#76b900" font-size="16" font-weight="bold">zero</text>
      <text x="360" y="15">COST</text><text x="360" y="35" fill="#76b900" font-size="16" font-weight="bold">free</text>
      <text x="460" y="15">GPU MEM</text><text x="460" y="35" fill="#e8eef4" font-size="16" font-weight="bold">17.4 GB</text>
      <text x="600" y="15">PATTERN</text><text x="600" y="35" fill="#00d4aa" font-size="16" font-weight="bold">reusable</text>
      <text x="740" y="15">LAYERS</text><text x="740" y="35" fill="#e8eef4" font-size="16" font-weight="bold">3</text>
      <text x="820" y="15">RECIPE</text><text x="820" y="35" fill="#ff9500" font-size="14" font-weight="bold">complete</text>
      <text x="950" y="15">SKILL</text><text x="950" y="35" fill="#76b900" font-size="14" font-weight="bold">saved</text>
    </g>
  </g>
  
  <!-- Title -->
  <text x="600" y="515" text-anchor="middle" fill="#e8eef4" font-family="'SF Pro Display', sans-serif" font-size="18" font-weight="bold">Custom Hermes Tools: Local Image Generation for Every Agent</text>
</svg>
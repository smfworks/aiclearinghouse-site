<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A Hermes daemon lifecycle: inbound goal, planner produces steps, READ and DRAFT run autonomously, SEND and DESTRUCTIVE pause for human approval, HTTP status server exposes task state">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080b12"/>
      <stop offset="50%" stop-color="#0c1320"/>
      <stop offset="100%" stop-color="#080b12"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1421"/>
      <stop offset="100%" stop-color="#090e17"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#162236" stroke-width="1" opacity="0.35">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="470" x2="1200" y2="470"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- inbound goal -->
  <g transform="translate(60, 260)" opacity="0.96">
    <rect x="0" y="0" width="180" height="110" rx="12" fill="url(#card)" stroke="#26354a" stroke-width="2"/>
    <circle cx="22" cy="55" r="8" fill="#ff6b00" filter="url(#glow)"/>
    <text x="48" y="48" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#f0f4fa">Inbound Goal</text>
    <text x="48" y="72" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#7d90aa">task queue · resume()</text>
  </g>

  <!-- arrow -->
  <g transform="translate(250, 308)" opacity="0.8">
    <path d="M0,10 L50,10" fill="none" stroke="#4b5c73" stroke-width="2"/>
    <path d="M44,4 L54,10 L44,16" fill="#4b5c73"/>
  </g>

  <!-- planner / broker -->
  <g transform="translate(320, 185)" opacity="0.96">
    <rect x="0" y="0" width="240" height="260" rx="14" fill="url(#card)" stroke="#26354a" stroke-width="2"/>
    <text x="120" y="32" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#f0f4fa">Planner + Broker</text>
    <text x="120" y="70" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#00d4ff">1. decompose goal</text>
    <text x="120" y="105" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#9fb0c7">2. annotate RiskClass</text>
    <text x="120" y="140" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#9fb0c7">3. route to backend</text>
    <text x="120" y="175" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#ff6b00">4. enforce policy</text>
    <path d="M60,205 L120,240 L180,205" fill="none" stroke="#4b5c73" stroke-width="2"/>
    <text x="120" y="258" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#7d90aa">autonomous_risks filter</text>
  </g>

  <!-- branches -->
  <g transform="translate(565, 308)" opacity="0.8">
    <path d="M0,10 L35,10 L35,-100 L65,-100" fill="none" stroke="#4b5c73" stroke-width="2"/>
    <path d="M59,-106 L69,-100 L59,-94" fill="#4b5c73"/>
    <path d="M0,10 L35,10 L35,120 L65,120" fill="none" stroke="#4b5c73" stroke-width="2"/>
    <path d="M59,114 L69,120 L59,126" fill="#4b5c73"/>
  </g>

  <!-- autonomous lane -->
  <g transform="translate(640, 150)" opacity="0.95">
    <rect x="0" y="0" width="240" height="150" rx="12" fill="url(#card)" stroke="#0891b2" stroke-width="2"/>
    <text x="120" y="32" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#00d4ff">Autonomous Lane</text>
    <text x="120" y="68" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#f0f4fa">RiskClass.READ · DRAFT</text>
    <text x="120" y="98" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#9fb0c7">read_file · list_dir</text>
    <text x="120" y="124" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#9fb0c7">draft · plan · summarize</text>
  </g>

  <!-- approval gate lane -->
  <g transform="translate(640, 370)" opacity="0.95">
    <rect x="0" y="0" width="240" height="150" rx="12" fill="url(#card)" stroke="#ff6b00" stroke-width="2"/>
    <text x="120" y="32" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#ff6b00">Approval Gate</text>
    <text x="120" y="68" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#f0f4fa">RiskClass.SEND · DESTRUCTIVE</text>
    <text x="120" y="98" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#9fb0c7">publish · email · delete</text>
    <text x="120" y="124" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#7d90aa">waiting_approval state</text>
  </g>

  <!-- HTTP status server -->
  <g transform="translate(930, 220)" opacity="0.95">
    <rect x="0" y="0" width="200" height="190" rx="12" fill="url(#card)" stroke="#7c3aed" stroke-width="2"/>
    <text x="100" y="32" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#a78bfa">HTTP Status</text>
    <text x="100" y="65" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#9fb0c7">GET /tasks</text>
    <text x="100" y="95" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#9fb0c7">GET /tasks/{id}</text>
    <text x="100" y="125" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#9fb0c7">POST /approve</text>
    <text x="100" y="155" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#9fb0c7">GET /health</text>
  </g>

  <!-- title -->
  <text x="600" y="545" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="700" fill="#f0f4fa">From One-Shot to Always-On</text>
  <text x="600" y="585" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#7d90aa">Building a Hermes daemon with approval-gated autonomy</text>

  <text x="600" y="615" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#4b5c73">SMF Clearinghouse · Liam's Landing</text>
</svg>

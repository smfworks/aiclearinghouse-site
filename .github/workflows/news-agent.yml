name: News Agent

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-news-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.NEWS_AGENT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: scripts/news-agent
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Git
        run: |
          git config user.name "SMF News Agent"
          git config user.email "news-agent@smfworks.com"

      - name: Run news agent
        working-directory: scripts/news-agent
        env:
          GH_TOKEN: ${{ secrets.NEWS_AGENT_TOKEN }}
        run: python run.py

      - name: Push changes
        run: |
          if git diff --quiet HEAD; then
            echo "No changes to commit."
          else
            git add content/ai-news/
            STORIES=$(git diff --cached --name-only | grep -c "content/ai-news/" || true)
            git commit -m "news: update AI news feed (+${STORIES} stories)"
            git push
          fi
